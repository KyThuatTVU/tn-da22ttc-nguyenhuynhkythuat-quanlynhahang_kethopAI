<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chấm Công - Nhân viên</title>
    <link rel="icon" type="image/png" href="../images/Green Simple Clean Vegan Food Logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        #video {
            transform: scaleX(-1);
        }
        #canvas {
            transform: scaleX(-1);
        }
        .btn-checkin {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }
        .btn-checkout {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }
        .metadata-overlay {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <!-- Main Card -->
    <div class="card rounded-3xl p-8 w-full max-w-2xl">
        <!-- Header -->
        <div class="text-center mb-6">
            <div class="inline-block mb-4">
                <img src="../images/Green Simple Clean Vegan Food Logo.png" 
                     alt="Logo" 
                     class="w-20 h-20 mx-auto rounded-full border-4 border-purple-500 shadow-lg">
            </div>
            <h1 class="text-3xl font-bold text-gray-800">Chấm Công</h1>
            <p class="text-gray-600 mt-2" id="staffInfo">Đang tải thông tin...</p>
            <div class="mt-4 text-sm text-gray-500">
                <i class="fas fa-clock mr-2"></i>
                <span id="currentTime"></span>
            </div>
        </div>

        <!-- Camera Section -->
        <div class="mb-6">
            <div class="relative bg-gray-900 rounded-2xl overflow-hidden" style="aspect-ratio: 4/3;">
                <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
                <canvas id="canvas" class="hidden w-full h-full object-cover"></canvas>
                <div id="preview" class="hidden w-full h-full"></div>
                
                <!-- Metadata Overlay -->
                <div class="metadata-overlay" id="metadataOverlay">
                    <div id="locationText">📍 Đang lấy vị trí...</div>
                    <div id="timeText">🕐 --:--:--</div>
                </div>
            </div>
        </div>

        <!-- Status Messages -->
        <div id="statusMessage" class="hidden mb-4 p-4 rounded-xl"></div>

        <!-- Action Buttons -->
        <div class="grid grid-cols-2 gap-4 mb-4">
            <button id="btnCheckin" onclick="capturePhoto('checkin')" 
                    class="btn-checkin text-white py-4 rounded-xl font-bold text-lg transition hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fas fa-sign-in-alt mr-2"></i>Check In
            </button>
            <button id="btnCheckout" onclick="capturePhoto('checkout')" 
                    class="btn-checkout text-white py-4 rounded-xl font-bold text-lg transition hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fas fa-sign-out-alt mr-2"></i>Check Out
            </button>
        </div>

        <!-- Xem lương -->
        <a href="luong-cua-toi.html" class="block w-full mb-4">
            <button class="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-white py-3 rounded-xl font-bold hover:from-amber-600 hover:to-orange-600 transition">
                <i class="fas fa-money-bill-wave mr-2"></i>Xem Lương Của Tôi
            </button>
        </a>

        <!-- Info -->
        <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-4">
            <p class="text-sm text-blue-800">
                <i class="fas fa-info-circle mr-2"></i>
                <strong>Lưu ý:</strong> Ảnh chấm công sẽ tự động lưu vị trí GPS, ngày giờ chụp. 
                Vui lòng cho phép truy cập camera và vị trí.
            </p>
        </div>

        <!-- History Today -->
        <div class="border-t pt-4">
            <h3 class="font-bold text-gray-800 mb-3">Lịch sử hôm nay</h3>
            <div id="historyToday" class="space-y-2">
                <p class="text-gray-500 text-sm italic">Đang tải...</p>
            </div>
        </div>

        <!-- Back Button -->
        <div class="mt-6 text-center">
            <a href="../admin/dashboard.html" class="text-purple-600 hover:text-purple-700 font-semibold">
                <i class="fas fa-arrow-left mr-2"></i>Quay lại Dashboard
            </a>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let video, canvas, stream;
        let currentLocation = null;
        let staffData = null;

        // Khởi tạo
        document.addEventListener('DOMContentLoaded', async () => {
            // Lấy thông tin nhân viên
            staffData = JSON.parse(sessionStorage.getItem('staff_user'));
            if (!staffData) {
                alert('Vui lòng đăng nhập!');
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('staffInfo').textContent = 
                `${staffData.ten_nhan_vien} - ${staffData.ma_nv_code}`;

            // Khởi tạo camera
            await initCamera();
            
            // Lấy vị trí
            await getLocation();
            
            // Cập nhật thời gian
            updateTime();
            setInterval(updateTime, 1000);

            // Load lịch sử hôm nay
            await loadTodayHistory();
        });

        // Khởi tạo camera
        async function initCamera() {
            try {
                video = document.getElementById('video');
                canvas = document.getElementById('canvas');
                
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'user',
                        width: { ideal: 1280 },
                        height: { ideal: 960 }
                    } 
                });
                
                video.srcObject = stream;
                showStatus('Camera đã sẵn sàng', 'success');
            } catch (err) {
                console.error('Camera error:', err);
                showStatus('Không thể truy cập camera. Vui lòng cấp quyền!', 'error');
            }
        }

        // Lấy vị trí GPS
        async function getLocation() {
            if (!navigator.geolocation) {
                document.getElementById('locationText').textContent = '📍 Không hỗ trợ GPS';
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    currentLocation = {
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude,
                        accuracy: position.coords.accuracy
                    };
                    document.getElementById('locationText').textContent = 
                        `📍 ${currentLocation.latitude.toFixed(6)}, ${currentLocation.longitude.toFixed(6)}`;
                },
                (error) => {
                    console.error('Location error:', error);
                    document.getElementById('locationText').textContent = '📍 Không lấy được vị trí';
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        // Cập nhật thời gian
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('vi-VN');
            const dateStr = now.toLocaleDateString('vi-VN');
            document.getElementById('currentTime').textContent = `${dateStr} ${timeStr}`;
            document.getElementById('timeText').textContent = `🕐 ${timeStr}`;
        }

        // Chụp ảnh và chấm công
        async function capturePhoto(type) {
            if (!currentLocation) {
                showStatus('Đang lấy vị trí GPS, vui lòng đợi...', 'warning');
                return;
            }

            const btn = type === 'checkin' ? document.getElementById('btnCheckin') : document.getElementById('btnCheckout');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Đang xử lý...';

            try {
                // Chụp ảnh từ video
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                
                // Vẽ video lên canvas (flip lại để đúng hướng)
                ctx.save();
                ctx.scale(-1, 1);
                ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
                ctx.restore();

                // Vẽ metadata lên ảnh
                const now = new Date();
                const metadata = [
                    `Nhân viên: ${staffData.ten_nhan_vien} (${staffData.ma_nv_code})`,
                    `Thời gian: ${now.toLocaleString('vi-VN')}`,
                    `Vị trí: ${currentLocation.latitude.toFixed(6)}, ${currentLocation.longitude.toFixed(6)}`,
                    `Loại: ${type === 'checkin' ? 'CHECK IN' : 'CHECK OUT'}`
                ];

                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(10, canvas.height - 110, 500, 100);
                ctx.fillStyle = 'white';
                ctx.font = '14px monospace';
                metadata.forEach((text, i) => {
                    ctx.fillText(text, 20, canvas.height - 90 + (i * 20));
                });

                // Chuyển canvas thành blob
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
                
                // Tạo FormData
                const formData = new FormData();
                formData.append('image', blob, `${type}_${Date.now()}.jpg`);
                formData.append('ma_nhan_vien', staffData.ma_nhan_vien);
                formData.append('loai', type);
                formData.append('latitude', currentLocation.latitude);
                formData.append('longitude', currentLocation.longitude);
                formData.append('accuracy', currentLocation.accuracy);

                // Gửi lên server
                const response = await fetch(`${API_URL}/attendance/checkin`, {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    showStatus(
                        type === 'checkin' ? '✅ Check In thành công!' : '✅ Check Out thành công!', 
                        'success'
                    );
                    await loadTodayHistory();
                } else {
                    showStatus('❌ ' + result.message, 'error');
                }
            } catch (err) {
                console.error('Capture error:', err);
                showStatus('❌ Có lỗi xảy ra: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = type === 'checkin' ? 
                    '<i class="fas fa-sign-in-alt mr-2"></i>Check In' : 
                    '<i class="fas fa-sign-out-alt mr-2"></i>Check Out';
            }
        }

        // Load lịch sử hôm nay
        async function loadTodayHistory() {
            try {
                const today = new Date().toISOString().split('T')[0];
                const response = await fetch(
                    `${API_URL}/attendance?ma_nhan_vien=${staffData.ma_nhan_vien}&start=${today}&end=${today}`,
                    { credentials: 'include' }
                );
                const result = await response.json();

                const container = document.getElementById('historyToday');
                
                if (result.success && result.data.length > 0) {
                    container.innerHTML = result.data.map(record => `
                        <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                            <div class="flex items-center space-x-3">
                                <div class="w-10 h-10 rounded-full flex items-center justify-center ${
                                    record.loai === 'checkin' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'
                                }">
                                    <i class="fas fa-${record.loai === 'checkin' ? 'sign-in-alt' : 'sign-out-alt'}"></i>
                                </div>
                                <div>
                                    <div class="font-semibold text-gray-800">
                                        ${record.loai === 'checkin' ? 'Check In' : 'Check Out'}
                                    </div>
                                    <div class="text-sm text-gray-500">
                                        ${new Date(record.thoi_gian).toLocaleTimeString('vi-VN')}
                                    </div>
                                </div>
                            </div>
                            ${record.anh_cham_cong ? `
                                <button onclick="viewImage('${record.anh_cham_cong}')" 
                                        class="text-blue-600 hover:text-blue-700">
                                    <i class="fas fa-image"></i>
                                </button>
                            ` : ''}
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="text-gray-500 text-sm italic">Chưa có chấm công nào hôm nay</p>';
                }
            } catch (err) {
                console.error('Load history error:', err);
            }
        }

        // Xem ảnh
        function viewImage(imagePath) {
            window.open(`${API_URL.replace('/api', '')}/${imagePath}`, '_blank');
        }

        // Hiển thị thông báo
        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.className = `mb-4 p-4 rounded-xl ${
                type === 'success' ? 'bg-green-100 text-green-800 border border-green-300' :
                type === 'error' ? 'bg-red-100 text-red-800 border border-red-300' :
                'bg-yellow-100 text-yellow-800 border border-yellow-300'
            }`;
            statusDiv.textContent = message;
            statusDiv.classList.remove('hidden');

            setTimeout(() => {
                statusDiv.classList.add('hidden');
            }, 5000);
        }

        // Cleanup khi rời trang
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
