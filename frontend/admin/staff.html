<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý nhân sự - Admin Phương Nam</title>
    <link rel="icon" type="image/png" href="../images/Green Simple Clean Vegan Food Logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="admin-styles.css">
    <link rel="stylesheet" href="admin-responsive.css">
    <style>
        body { background: #f0f4f8; }
        .sidebar { background: linear-gradient(180deg, #1e3a5f 0%, #0f2744 100%); }
        .sidebar-item { color: #94a3b8; transition: all 0.2s; }
        .sidebar-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .sidebar-item.active { background: linear-gradient(90deg, #3b82f6 0%, #1d4ed8 100%); color: #fff; }
        .header-bar { background: linear-gradient(90deg, #1e3a5f 0%, #2d4a6f 100%); color: #fff; padding: 16px 28px; }
        .content-card { background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(30,58,95,0.08); }
        .btn-primary { background: linear-gradient(90deg, #3b82f6 0%, #1d4ed8 100%); color: #fff; padding: 10px 20px; border-radius: 8px; font-weight: 500; transition: all 0.2s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59,130,246,0.4); }
        .badge-active { background: #dcfce7; color: #16a34a; padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 500; }
        .badge-inactive { background: #fee2e2; color: #dc2626; padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 500; }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); overflow-y: auto; }
        .modal-content { background: #fff; margin: 2% auto; padding: 0; border-radius: 16px; max-width: 800px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .modal-header { background: linear-gradient(90deg, #1e3a5f 0%, #2d4a6f 100%); color: #fff; padding: 20px 24px; border-radius: 16px 16px 0 0; }
        .modal-body { padding: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 0.875rem; font-weight: 600; color: #1e3a5f; margin-bottom: 6px; }
        .form-input { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.875rem; transition: all 0.2s; }
        .form-input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .form-select { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.875rem; }
        
        .filter-section { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 24px; border: 1px solid #e2e8f0; }
        .search-input { padding-left: 36px; }
        /* Image Upload Styles */
        .img-upload-box { border: 2px dashed #cbd5e1; border-radius: 10px; padding: 12px; text-align: center; cursor: pointer; transition: all 0.2s; background: #f8fafc; }
        .img-upload-box:hover { border-color: #3b82f6; background: #eff6ff; }
        .img-upload-box img { max-width: 100%; max-height: 100px; object-fit: contain; margin: 0 auto; border-radius: 6px; display: block; }
        .img-preview { width: 100%; height: 100px; object-fit: cover; border-radius: 6px; cursor: zoom-in; }
        /* Photo Viewer */
        #photoViewer { display:none; position:fixed; z-index:9999; inset:0; background:rgba(0,0,0,0.85); align-items:center; justify-content:center; }
        #photoViewer.open { display:flex; }
        #photoViewer img { max-width:90vw; max-height:90vh; border-radius:12px; box-shadow:0 20px 60px rgba(0,0,0,.5); }
        #photoViewer button { position:absolute; top:20px; right:24px; color:#fff; font-size:2rem; background:none; border:none; cursor:pointer; }
    </style>
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Header Placeholder -->
            <div id="header-placeholder"></div>

            <main class="flex-1 overflow-y-auto p-6">
                <!-- Filters -->
                <div class="filter-section flex flex-wrap gap-4 items-center">
                    <div class="relative flex-1 min-w-[300px]">
                        <i class="fas fa-search absolute left-3 top-3.5 text-gray-400"></i>
                        <input type="text" id="search-input" oninput="loadStaff()" placeholder="Tìm theo tên, mã NV hoặc số điện thoại..." class="form-input search-input">
                    </div>
                    <div class="w-48">
                        <select id="filter-role" onchange="loadStaff()" class="form-select">
                            <option value="">-- Tất cả vai trò --</option>
                            <option value="admin">Quản trị viên</option>
                            <option value="manager">Quản lý</option>
                            <option value="cashier">Thu ngân</option>
                            <option value="waiter">Phục vụ</option>
                            <option value="chef">Đầu bếp</option>
                        </select>
                    </div>
                    <div class="w-48">
                        <select id="filter-status" onchange="loadStaff()" class="form-select">
                            <option value="">-- Tất cả trạng thái --</option>
                            <option value="1">Đang làm việc</option>
                            <option value="0">Tạm nghỉ / Khóa</option>
                        </select>
                    </div>
                </div>

                <div class="content-card">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="border-b border-gray-200 bg-gray-50">
                                    <th class="text-left py-4 px-4 text-sm font-bold text-gray-600">ID</th>
                                    <th class="text-left py-4 px-4 text-sm font-bold text-gray-600">Nhân viên</th>
                                    <th class="text-left py-4 px-4 text-sm font-bold text-gray-600">Vai trò</th>
                                    <th class="text-left py-4 px-4 text-sm font-bold text-gray-600">Số điện thoại</th>
                                    <th class="text-left py-4 px-4 text-sm font-bold text-gray-600">Ngày vào làm</th>
                                    <th class="text-left py-4 px-4 text-sm font-bold text-gray-600">Trạng thái</th>
                                    <th class="text-center py-4 px-4 text-sm font-bold text-gray-600">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="staff-table-body">
                                <tr>
                                    <td colspan="7" class="text-center py-8 text-gray-400">
                                        <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                                        <p>Đang tải dữ liệu...</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="staffModal" class="modal">
        <div class="modal-content">
            <div class="modal-header flex justify-between items-center">
                <h3 id="modal-title" class="text-lg font-bold">Thông tin nhân viên</h3>
                <button onclick="closeModal()" class="text-white hover:text-gray-300">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="staffForm" class="grid grid-cols-2 gap-4">
                    <input type="hidden" id="staff-id">
                    
                    <!-- Cột 1 -->
                    <div class="col-span-1">
                        <div class="form-group">
                            <label class="form-label">Tên nhân viên <span class="text-red-500">*</span></label>
                            <input type="text" id="staff-name" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Tài khoản <span class="text-red-500">*</span></label>
                            <input type="text" id="staff-username" class="form-input" required>
                        </div>
                        <div class="form-group" id="password-group">
                            <label class="form-label">Mật khẩu <span class="text-red-500">*</span></label>
                            <input type="password" id="staff-password" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Số điện thoại</label>
                            <input type="tel" id="staff-phone" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Vai trò <span class="text-red-500">*</span></label>
                            <select id="staff-role" class="form-select" required>
                                <option value="waiter">Phục vụ</option>
                                <option value="cashier">Thu ngân</option>
                                <option value="chef">Đầu bếp</option>
                                <option value="manager">Quản lý</option>
                                <option value="admin">Quản trị viên</option>
                            </select>
                        </div>
                    </div>

                    <!-- Cột 2 -->
                    <div class="col-span-1">


                        <div class="form-group">
                            <label class="form-label">Ngày sinh</label>
                            <input type="date" id="staff-dob" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Giới tính</label>
                            <select id="staff-gender" class="form-select">
                                <option value="Nam">Nam</option>
                                <option value="Nữ">Nữ</option>
                                <option value="Khác">Khác</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Địa chỉ</label>
                            <input type="text" id="staff-address" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Ngày vào làm</label>
                            <input type="date" id="staff-join-date" class="form-input">
                        </div>
                    </div>

                    <!-- Lương -->
                    <div class="col-span-2 border-t pt-4">
                        <label class="form-label mb-3">Hình thức trả lương <span class="text-red-500">*</span></label>
                        <div class="flex space-x-6 mb-4">
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="radio" name="salary_type" value="hourly" class="form-radio text-blue-600" checked onchange="toggleSalaryType()">
                                <span class="text-sm font-medium text-gray-700">Trả theo giờ</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="radio" name="salary_type" value="fixed" class="form-radio text-blue-600" onchange="toggleSalaryType()">
                                <span class="text-sm font-medium text-gray-700">Lương cứng cố định</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="radio" name="salary_type" value="both" class="form-radio text-blue-600" onchange="toggleSalaryType()">
                                <span class="text-sm font-medium text-gray-700">Kết hợp cả hai</span>
                            </label>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="form-group">
                                <label class="form-label">Lương theo giờ (VNĐ)</label>
                                <input type="number" id="staff-salary-hour" class="form-input transition-colors" placeholder="0">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Lương cơ bản (Tháng)</label>
                                <input type="number" id="staff-salary-base" class="form-input transition-colors bg-gray-100" placeholder="0" disabled>
                            </div>
                        </div>
                    </div>

                    <!-- Ảnh đại diện & Ảnh CCCD -->
                    <div class="col-span-2 border-t pt-4">
                        <label class="form-label mb-3">Ảnh nhân viên</label>
                        <div class="grid grid-cols-3 gap-4">
                            <!-- Ảnh đại diện -->
                            <div class="form-group">
                                <label class="form-label text-center block">Ảnh đại diện</label>
                                <input type="hidden" id="staff-avatar">
                                <div class="img-upload-box" onclick="document.getElementById('file-avatar').click()">
                                    <img id="avatar-preview" src="" alt="" class="img-preview hidden">
                                    <div id="avatar-placeholder">
                                        <i class="fas fa-camera text-2xl text-gray-400 mb-1"></i>
                                        <p class="text-xs text-gray-400">Click để chọn ảnh</p>
                                        <p class="text-[10px] text-gray-300">(JPG, PNG • Tối đa 5MB)</p>
                                    </div>
                                </div>
                                <input type="file" id="file-avatar" accept="image/*" class="hidden" onchange="handleFileUpload(this, 'staff-avatar', 'avatar-preview', 'avatar-placeholder')">
                            </div>
                            <!-- Ảnh CCCD mặt trước -->
                            <div class="form-group">
                                <label class="form-label text-center block">CCCD - Mặt trước</label>
                                <input type="hidden" id="staff-cccd-img">
                                <div class="img-upload-box" onclick="document.getElementById('file-cccd-img').click()">
                                    <img id="cccd-img-preview" src="" alt="" class="img-preview hidden">
                                    <div id="cccd-img-placeholder">
                                        <i class="fas fa-id-card text-2xl text-gray-400 mb-1"></i>
                                        <p class="text-xs text-gray-400">Mặt trước CCCD</p>
                                        <p class="text-[10px] text-gray-300">(JPG, PNG • Tối đa 5MB)</p>
                                    </div>
                                </div>
                                <input type="file" id="file-cccd-img" accept="image/*" class="hidden" onchange="handleFileUpload(this, 'staff-cccd-img', 'cccd-img-preview', 'cccd-img-placeholder')">
                            </div>
                            <!-- Ảnh CCCD mặt sau -->
                            <div class="form-group">
                                <label class="form-label text-center block">CCCD - Mặt sau</label>
                                <input type="hidden" id="staff-cccd-sau-img">
                                <div class="img-upload-box" onclick="document.getElementById('file-cccd-sau-img').click()">
                                    <img id="cccd-sau-img-preview" src="" alt="" class="img-preview hidden">
                                    <div id="cccd-sau-img-placeholder">
                                        <i class="fas fa-id-card text-2xl text-gray-400 mb-1"></i>
                                        <p class="text-xs text-gray-400">Mặt sau CCCD</p>
                                        <p class="text-[10px] text-gray-300">(JPG, PNG • Tối đa 5MB)</p>
                                    </div>
                                </div>
                                <input type="file" id="file-cccd-sau-img" accept="image/*" class="hidden" onchange="handleFileUpload(this, 'staff-cccd-sau-img', 'cccd-sau-img-preview', 'cccd-sau-img-placeholder')">
                            </div>
                        </div>
                    </div>

                    <div class="col-span-2">
                        <div class="form-group">
                            <label class="form-label">Trạng thái</label>
                            <select id="staff-status" class="form-select">
                                <option value="1">Đang làm việc</option>
                                <option value="0">Tạm nghỉ / Khóa</option>
                            </select>
                        </div>
                    </div>

                    <div class="col-span-2 flex justify-end space-x-3 mt-4 border-t pt-4">
                        <button type="button" onclick="closeModal()" class="px-6 py-2 border rounded-lg hover:bg-gray-50">Hủy</button>
                        <button type="submit" class="btn-primary px-8">Lưu hồ sơ</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Photo Viewer Modal -->
    <div id="photoViewer" onclick="closePhotoViewer()">
        <button onclick="closePhotoViewer()">&times;</button>
        <img id="photoViewerImg" src="" alt="">
    </div>

    <!-- Password Modal -->
    <div id="passwordModal" class="modal">
        <div class="modal-content max-w-md">
            <div class="modal-header"><h3>Đổi mật khẩu</h3></div>
            <div class="modal-body">
                <form id="passwordForm">
                    <input type="hidden" id="pass-staff-id">
                    <div class="form-group">
                        <label class="form-label">Mật khẩu mới</label>
                        <input type="password" id="new-pass" class="form-input" required minlength="6">
                    </div>
                    <div class="flex justify-end space-x-3">
                        <button type="button" onclick="closePasswordModal()" class="px-4 py-2 border rounded-lg">Hủy</button>
                        <button type="submit" class="btn-primary">Cập nhật</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="check-auth.js"></script>
    <script src="admin-layout.js"></script>
    <script>
        // API_URL is handled by admin-layout.js
        const STAFF_API = `${API_URL}/staff`;
        let isEditMode = false;

        function viewPhoto(src, title) {
            if (!src) return;
            document.getElementById('photoViewerImg').src = src;
            document.getElementById('photoViewer').classList.add('open');
        }
        function closePhotoViewer() {
            document.getElementById('photoViewer').classList.remove('open');
        }

        // Upload ảnh lên server và hiển thị preview
        async function handleFileUpload(input, hiddenId, previewId, placeholderId) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];

            // Hiển thị preview tạm bằng local FileReader trước khi upload
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById(previewId);
                img.src = e.target.result;
                img.classList.remove('hidden');
                document.getElementById(placeholderId).classList.add('hidden');
            };
            reader.readAsDataURL(file);

            // Upload lên server
            try {
                const formData = new FormData();
                formData.append('image', file);
                const res = await fetch(`${API_URL}/upload/staff`, {
                    method: 'POST',
                    body: formData
                });
                const result = await res.json();
                if (result.success) {
                    document.getElementById(hiddenId).value = result.url;
                } else {
                    alert('Upload ảnh thất bại: ' + result.message);
                }
            } catch (err) {
                console.error('Upload error:', err);
                alert('Lỗi upload ảnh!');
            }
        }

        function resetImagePreview(previewId, placeholderId, hiddenId, fileInputId) {
            document.getElementById(previewId).classList.add('hidden');
            document.getElementById(previewId).src = '';
            document.getElementById(placeholderId).classList.remove('hidden');
            document.getElementById(hiddenId).value = '';
            document.getElementById(fileInputId).value = '';
        }

        function toggleSalaryType() {
            const type = document.querySelector('input[name="salary_type"]:checked').value;
            const hourInput = document.getElementById('staff-salary-hour');
            const baseInput = document.getElementById('staff-salary-base');

            if (type === 'hourly') {
                hourInput.disabled = false;
                hourInput.classList.remove('bg-gray-100', 'cursor-not-allowed');
                baseInput.value = 0;
                baseInput.disabled = true;
                baseInput.classList.add('bg-gray-100', 'cursor-not-allowed');
            } else if (type === 'fixed') {
                baseInput.disabled = false;
                baseInput.classList.remove('bg-gray-100', 'cursor-not-allowed');
                hourInput.value = 0;
                hourInput.disabled = true;
                hourInput.classList.add('bg-gray-100', 'cursor-not-allowed');
            } else {
                hourInput.disabled = false;
                hourInput.classList.remove('bg-gray-100', 'cursor-not-allowed');
                baseInput.disabled = false;
                baseInput.classList.remove('bg-gray-100', 'cursor-not-allowed');
            }
        }

        async function loadStaff() {
            try {
                const search = document.getElementById('search-input').value;
                const role = document.getElementById('filter-role').value;
                const status = document.getElementById('filter-status').value;
                
                const response = await fetch(`${STAFF_API}?search=${search}&role=${role}&status=${status}`);
                const result = await response.json();
                
                if (result.success) displayStaff(result.data);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function displayStaff(list) {
            const tbody = document.getElementById('staff-table-body');
            if (list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-gray-500">Không tìm thấy dữ liệu</td></tr>';
                return;
            }

            tbody.innerHTML = list.map(s => `
                <tr class="border-b hover:bg-gray-50 transition">
                    <td class="py-4 px-4 text-sm font-bold text-blue-600">${s.ma_nv_code || s.ma_nhan_vien}</td>
                    <td class="py-4 px-4">
                        <div class="flex items-center space-x-3">
                            <img src="${s.anh_dai_dien || 'https://ui-avatars.com/api/?name='+encodeURIComponent(s.ten_nhan_vien)+'&background=random'}" class="w-10 h-10 rounded-full border">
                            <div>
                                <p class="font-bold text-gray-800">${s.ten_nhan_vien}</p>
                                <p class="text-xs text-gray-500">${s.tai_khoan}</p>
                            </div>
                        </div>
                    </td>
                    <td class="py-4 px-4">
                        <span class="px-3 py-1 bg-gray-100 rounded-full text-xs font-bold uppercase text-gray-600">${s.vai_tro}</span>
                    </td>
                    <td class="py-4 px-4">
                        <p class="text-sm text-gray-700 font-medium">${s.so_dien_thoai || 'N/A'}</p>
                        <div class="flex space-x-2 mt-1">
                            ${s.anh_cccd ? `<button onclick="viewPhoto('${s.anh_cccd}', 'Mặt trước CCCD')" class="text-[10px] text-blue-500 hover:underline"><i class="fas fa-id-card"></i> Trước</button>` : ''}
                            ${s.anh_cccd_sau ? `<button onclick="viewPhoto('${s.anh_cccd_sau}', 'Mặt sau CCCD')" class="text-[10px] text-blue-500 hover:underline"><i class="fas fa-id-card"></i> Sau</button>` : ''}
                        </div>
                    </td>
                    <td class="py-4 px-4 text-sm text-gray-600">
                        ${s.ngay_vao_lam ? new Date(s.ngay_vao_lam).toLocaleDateString('vi-VN') : '-'}
                    </td>
                    <td class="py-4 px-4">
                        <span class="${s.trang_thai === 1 ? 'badge-active' : 'badge-inactive'}">
                            ${s.trang_thai === 1 ? 'Đang làm việc' : 'Đã khóa'}
                        </span>
                    </td>
                    <td class="py-4 px-4">
                        <div class="flex justify-center space-x-1">
                            <button onclick="openEditModal(${s.ma_nhan_vien})" class="p-2 text-blue-600 hover:bg-blue-50 rounded-full transition-colors" title="Chỉnh sửa"><i class="fas fa-edit text-lg"></i></button>
                            <button onclick="openPasswordModal(${s.ma_nhan_vien})" class="p-2 text-orange-500 hover:bg-orange-50 rounded-full transition-colors" title="Đổi mật khẩu"><i class="fas fa-key text-lg"></i></button>
                            <button onclick="window.location.href='quan-ly-quyen-nhan-vien.html?id=${s.ma_nhan_vien}'" class="p-2 text-purple-600 hover:bg-purple-50 rounded-full transition-colors" title="Phân quyền"><i class="fas fa-shield-alt text-lg"></i></button>
                            <button onclick="deleteStaff(${s.ma_nhan_vien})" class="p-2 text-red-600 hover:bg-red-50 rounded-full transition-colors" title="Xóa"><i class="fas fa-trash text-lg"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function openAddModal() {
            isEditMode = false;
            document.getElementById('modal-title').textContent = 'Thêm nhân viên mới';
            document.getElementById('staffForm').reset();
            document.getElementById('password-group').style.display = 'block';
            document.getElementById('staff-username').readOnly = false;
            document.querySelector('input[name="salary_type"][value="hourly"]').checked = true;
            toggleSalaryType();
            // reset image previews
            resetImagePreview('avatar-preview', 'avatar-placeholder', 'staff-avatar', 'file-avatar');
            resetImagePreview('cccd-img-preview', 'cccd-img-placeholder', 'staff-cccd-img', 'file-cccd-img');
            resetImagePreview('cccd-sau-img-preview', 'cccd-sau-img-placeholder', 'staff-cccd-sau-img', 'file-cccd-sau-img');
            document.getElementById('staffModal').style.display = 'block';
        }

        async function openEditModal(id) {
            isEditMode = true;
            document.getElementById('modal-title').textContent = 'Cập nhật hồ sơ nhân viên';
            document.getElementById('password-group').style.display = 'none';
            document.getElementById('staff-username').readOnly = false;

            try {
                const response = await fetch(STAFF_API);
                const result = await response.json();
                const s = result.data.find(x => x.ma_nhan_vien === id);
                if (s) {
                    document.getElementById('staff-id').value = s.ma_nhan_vien;
                    document.getElementById('staff-name').value = s.ten_nhan_vien;
                    document.getElementById('staff-username').value = s.tai_khoan;
                    document.getElementById('staff-phone').value = s.so_dien_thoai || '';
                    document.getElementById('staff-role').value = s.vai_tro;
                    document.getElementById('staff-dob').value = s.ngay_sinh ? s.ngay_sinh.split('T')[0] : '';
                    document.getElementById('staff-gender').value = s.gioi_tinh || 'Nam';
                    document.getElementById('staff-address').value = s.dia_chi || '';
                    document.getElementById('staff-join-date').value = s.ngay_vao_lam ? s.ngay_vao_lam.split('T')[0] : '';
                    
                    // Ảnh đại diện
                    const avatarUrl = s.anh_dai_dien || '';
                    document.getElementById('staff-avatar').value = avatarUrl;
                    if (avatarUrl) {
                        const avImg = document.getElementById('avatar-preview');
                        avImg.src = avatarUrl;
                        avImg.classList.remove('hidden');
                        document.getElementById('avatar-placeholder').classList.add('hidden');
                    } else {
                        resetImagePreview('avatar-preview', 'avatar-placeholder', 'staff-avatar', 'file-avatar');
                    }
                    // Ảnh CCCD
                    const cccdUrl = s.anh_cccd || '';
                    document.getElementById('staff-cccd-img').value = cccdUrl;
                    if (cccdUrl) {
                        const ccImg = document.getElementById('cccd-img-preview');
                        ccImg.src = cccdUrl;
                        ccImg.classList.remove('hidden');
                        document.getElementById('cccd-img-placeholder').classList.add('hidden');
                    } else {
                        resetImagePreview('cccd-img-preview', 'cccd-img-placeholder', 'staff-cccd-img', 'file-cccd-img');
                    }
                    // Ảnh CCCD mặt sau
                    const cccdSauUrl = s.anh_cccd_sau || '';
                    document.getElementById('staff-cccd-sau-img').value = cccdSauUrl;
                    if (cccdSauUrl) {
                        const ccSauImg = document.getElementById('cccd-sau-img-preview');
                        ccSauImg.src = cccdSauUrl;
                        ccSauImg.classList.remove('hidden');
                        document.getElementById('cccd-sau-img-placeholder').classList.add('hidden');
                    } else {
                        resetImagePreview('cccd-sau-img-preview', 'cccd-sau-img-placeholder', 'staff-cccd-sau-img', 'file-cccd-sau-img');
                    }
                    
                    const h = parseFloat(s.luong_theo_gio || 0);
                    const b = parseFloat(s.luong_co_ban || 0);
                    if (h > 0 && b > 0) document.querySelector('input[name="salary_type"][value="both"]').checked = true;
                    else if (b > 0) document.querySelector('input[name="salary_type"][value="fixed"]').checked = true;
                    else document.querySelector('input[name="salary_type"][value="hourly"]').checked = true;
                    
                    toggleSalaryType();
                    
                    document.getElementById('staff-salary-hour').value = s.luong_theo_gio || 0;
                    document.getElementById('staff-salary-base').value = s.luong_co_ban || 0;
                    document.getElementById('staff-status').value = s.trang_thai;
                    document.getElementById('staffModal').style.display = 'block';
                }
            } catch (error) { console.error(error); }
        }

        function closeModal() { document.getElementById('staffModal').style.display = 'none'; }

        document.getElementById('staffForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('staff-id').value;
            const data = {
                ten_nhan_vien: document.getElementById('staff-name').value,
                tai_khoan: document.getElementById('staff-username').value,
                so_dien_thoai: document.getElementById('staff-phone').value,
                vai_tro: document.getElementById('staff-role').value,
                ngay_sinh: document.getElementById('staff-dob').value,
                gioi_tinh: document.getElementById('staff-gender').value,
                dia_chi: document.getElementById('staff-address').value,
                ngay_vao_lam: document.getElementById('staff-join-date').value,
                luong_theo_gio: document.getElementById('staff-salary-hour').value,
                luong_co_ban: document.getElementById('staff-salary-base').value,
                trang_thai: document.getElementById('staff-status').value,
                anh_dai_dien: document.getElementById('staff-avatar').value || null,
                anh_cccd: document.getElementById('staff-cccd-img').value || null,
                anh_cccd_sau: document.getElementById('staff-cccd-sau-img').value || null
            };
            if (!isEditMode) data.mat_khau = document.getElementById('staff-password').value;

            try {
                const url = isEditMode ? `${STAFF_API}/${id}` : STAFF_API;
                const method = isEditMode ? 'PUT' : 'POST';
                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const res = await response.json();
                if (res.success) {
                    alert('Thành công!');
                    closeModal();
                    loadStaff();
                } else alert(res.message);
            } catch (error) { console.error(error); }
        });

        async function deleteStaff(id) {
            if (!confirm('Xác nhận xóa (vĩnh viễn sẽ chuyển vào trạng thái ẩn)?')) return;
                const response = await fetch(`${STAFF_API}/${id}`, { method: 'DELETE' });
            const res = await response.json();
            if (res.success) loadStaff();
        }

        function openPasswordModal(id) {
            document.getElementById('pass-staff-id').value = id;
            document.getElementById('passwordModal').style.display = 'block';
        }
        function closePasswordModal() { document.getElementById('passwordModal').style.display = 'none'; }

        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('pass-staff-id').value;
            const mat_khau_moi = document.getElementById('new-pass').value;
            const response = await fetch(`${STAFF_API}/${id}/password`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mat_khau_moi })
            });
            const res = await response.json();
            if (res.success) { alert('Đã đổi mật khẩu'); closePasswordModal(); }
        });

        loadStaff();
    </script>
</body>
</html>
