<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lương Hàng Ngày - Admin</title>
    <link rel="icon" type="image/png" href="../images/Green Simple Clean Vegan Food Logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="admin-styles.css">
    <link rel="stylesheet" href="admin-responsive.css">
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Header Placeholder -->
            <div id="header-placeholder"></div>

            <main class="flex-1 overflow-y-auto p-6">
                <!-- Header Actions -->
                <div class="content-card mb-6 border-l-4 border-green-500">
                    <div class="flex items-center justify-between mb-4">
                        <div>
                            <h2 class="text-2xl font-bold text-gray-800">Lương Tạm Tính Hàng Ngày</h2>
                            <p class="text-sm text-gray-600">Theo dõi lương dự kiến của nhân viên theo ngày</p>
                        </div>
                        <button onclick="recalculateToday()" class="bg-green-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-700 transition">
                            <i class="fas fa-calculator mr-2"></i>Tính Lại Hôm Nay
                        </button>
                    </div>

                    <!-- Filters -->
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div class="form-group mb-0">
                            <label class="form-label">Nhân viên</label>
                            <select id="filterStaff" class="form-select" onchange="loadDailySalary()"></select>
                        </div>
                        <div class="form-group mb-0">
                            <label class="form-label">Từ ngày</label>
                            <input type="date" id="filterStart" class="form-input" onchange="loadDailySalary()">
                        </div>
                        <div class="form-group mb-0">
                            <label class="form-label">Đến ngày</label>
                            <input type="date" id="filterEnd" class="form-input" onchange="loadDailySalary()">
                        </div>
                        <div class="form-group mb-0">
                            <label class="form-label">&nbsp;</label>
                            <button onclick="generateMonthly()" class="w-full bg-blue-600 text-white p-2.5 rounded-lg font-bold hover:bg-blue-700 transition">
                                <i class="fas fa-file-invoice-dollar mr-2"></i>Tạo Bảng Lương Tháng
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Summary Cards -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                    <div class="bg-blue-50 border border-blue-100 p-4 rounded-xl">
                        <div class="flex items-center space-x-3">
                            <div class="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center text-white">
                                <i class="fas fa-users"></i>
                            </div>
                            <div>
                                <p class="text-xs text-blue-600 font-bold uppercase">Nhân viên</p>
                                <h4 id="countStaff" class="text-2xl font-black text-blue-900">0</h4>
                            </div>
                        </div>
                    </div>
                    <div class="bg-green-50 border border-green-100 p-4 rounded-xl">
                        <div class="flex items-center space-x-3">
                            <div class="w-12 h-12 bg-green-500 rounded-full flex items-center justify-center text-white">
                                <i class="fas fa-clock"></i>
                            </div>
                            <div>
                                <p class="text-xs text-green-600 font-bold uppercase">Tổng giờ</p>
                                <h4 id="totalHours" class="text-2xl font-black text-green-900">0h</h4>
                            </div>
                        </div>
                    </div>
                    <div class="bg-purple-50 border border-purple-100 p-4 rounded-xl">
                        <div class="flex items-center space-x-3">
                            <div class="w-12 h-12 bg-purple-500 rounded-full flex items-center justify-center text-white">
                                <i class="fas fa-calendar-check"></i>
                            </div>
                            <div>
                                <p class="text-xs text-purple-600 font-bold uppercase">Ngày làm</p>
                                <h4 id="totalDays" class="text-2xl font-black text-purple-900">0</h4>
                            </div>
                        </div>
                    </div>
                    <div class="bg-amber-50 border border-amber-100 p-4 rounded-xl">
                        <div class="flex items-center space-x-3">
                            <div class="w-12 h-12 bg-amber-500 rounded-full flex items-center justify-center text-white">
                                <i class="fas fa-money-bill-wave"></i>
                            </div>
                            <div>
                                <p class="text-xs text-amber-600 font-bold uppercase">Tổng lương</p>
                                <h4 id="totalSalary" class="text-2xl font-black text-amber-900">0đ</h4>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Table -->
                <div class="content-card">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="border-b bg-gray-50">
                                    <th class="text-left py-4 px-4 text-sm font-bold text-gray-600">Ngày</th>
                                    <th class="text-left py-4 px-4 text-sm font-bold text-gray-600">Nhân viên</th>
                                    <th class="text-center py-4 px-4 text-sm font-bold text-gray-600">Giờ làm</th>
                                    <th class="text-right py-4 px-4 text-sm font-bold text-gray-600">Lương/giờ</th>
                                    <th class="text-right py-4 px-4 text-sm font-bold text-gray-600">Lương ngày</th>
                                    <th class="text-left py-4 px-4 text-sm font-bold text-gray-600">Trạng thái</th>
                                    <th class="text-left py-4 px-4 text-sm font-bold text-gray-600">Ghi chú</th>
                                </tr>
                            </thead>
                            <tbody id="salaryTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="check-auth.js"></script>
    <script src="admin-layout.js"></script>
    <script>
        const DAILY_SALARY_API = `${API_URL}/daily-salary`;
        const STAFF_API = `${API_URL}/staff`;

        document.addEventListener('DOMContentLoaded', () => {
            // Set ngày mặc định (tháng hiện tại)
            const now = new Date();
            const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
            const today = now.toISOString().split('T')[0];
            document.getElementById('filterStart').value = startOfMonth;
            document.getElementById('filterEnd').value = today;

            loadStaffOptions();
            loadDailySalary();
        });

        async function loadStaffOptions() {
            try {
                const res = await fetch(STAFF_API, { credentials: 'include' });
                const data = await res.json();

                if (data.success && Array.isArray(data.data)) {
                    const staffList = data.data.filter(s => s.trang_thai === 1);
                    document.getElementById('filterStaff').innerHTML = 
                        '<option value="">-- Tất cả nhân viên --</option>' +
                        staffList.map(s => `<option value="${s.ma_nhan_vien}">${s.ten_nhan_vien} (${s.ma_nv_code})</option>`).join('');
                }
            } catch (err) {
                console.error('Error loading staff:', err);
            }
        }

        async function loadDailySalary() {
            try {
                const staffId = document.getElementById('filterStaff').value;
                const start = document.getElementById('filterStart').value;
                const end = document.getElementById('filterEnd').value;

                let url = `${DAILY_SALARY_API}?start=${start}&end=${end}`;
                if (staffId) url += `&ma_nhan_vien=${staffId}`;

                const res = await fetch(url, { credentials: 'include' });
                const data = await res.json();

                if (data.success) {
                    displaySalary(data.data, data.summary);
                } else {
                    alert('Không thể tải dữ liệu!');
                }
            } catch (err) {
                console.error('Error:', err);
                alert('Lỗi kết nối server!');
            }
        }

        function displaySalary(data, summary) {
            // Update summary cards
            const uniqueStaff = [...new Set(data.map(d => d.ma_nhan_vien))].length;
            document.getElementById('countStaff').textContent = uniqueStaff;
            document.getElementById('totalHours').textContent = parseFloat(summary.tong_gio_lam).toFixed(1) + 'h';
            document.getElementById('totalDays').textContent = summary.so_ngay_lam;
            document.getElementById('totalSalary').textContent = parseFloat(summary.tong_luong).toLocaleString('vi-VN') + 'đ';

            // Update table
            const tbody = document.getElementById('salaryTableBody');

            if (data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center py-10 text-gray-400 italic">
                            Không có dữ liệu lương trong khoảng thời gian này
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = data.map(d => {
                let statusClass = 'bg-green-100 text-green-600';
                if (d.trang_thai_cham_cong && d.trang_thai_cham_cong.includes('muộn')) {
                    statusClass = 'bg-yellow-100 text-yellow-600';
                } else if (d.trang_thai_cham_cong && d.trang_thai_cham_cong.includes('sớm')) {
                    statusClass = 'bg-red-100 text-red-600';
                }

                return `
                    <tr class="border-b hover:bg-gray-50 transition">
                        <td class="py-4 px-4">
                            <span class="font-bold text-gray-800">${new Date(d.ngay).toLocaleDateString('vi-VN')}</span>
                        </td>
                        <td class="py-4 px-4">
                            <p class="font-bold text-gray-800">${d.ten_nhan_vien}</p>
                            <p class="text-xs text-gray-500">${d.ma_nv_code}</p>
                        </td>
                        <td class="py-4 px-4 text-center font-bold text-blue-600">
                            ${parseFloat(d.so_gio_lam).toFixed(2)}h
                        </td>
                        <td class="py-4 px-4 text-right text-gray-700">
                            ${parseFloat(d.luong_theo_gio).toLocaleString('vi-VN')}đ
                        </td>
                        <td class="py-4 px-4 text-right font-bold text-green-600">
                            ${parseFloat(d.luong_ngay).toLocaleString('vi-VN')}đ
                        </td>
                        <td class="py-4 px-4">
                            <span class="px-3 py-1 rounded-lg text-xs font-bold ${statusClass}">
                                ${d.trang_thai_cham_cong || 'Đúng giờ'}
                            </span>
                        </td>
                        <td class="py-4 px-4 text-sm text-gray-600">
                            ${d.ghi_chu || '-'}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function recalculateToday() {
            if (!confirm('Tính lại lương cho tất cả nhân viên đã chấm công hôm nay?')) return;

            try {
                const res = await fetch(`${DAILY_SALARY_API}/recalculate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ ngay: new Date().toISOString().split('T')[0] })
                });

                const result = await res.json();
                if (result.success) {
                    alert(`✅ ${result.message}\nThành công: ${result.data.thanh_cong}\nThất bại: ${result.data.that_bai}`);
                    loadDailySalary();
                } else {
                    alert('❌ ' + result.message);
                }
            } catch (err) {
                console.error('Error:', err);
                alert('Lỗi kết nối server!');
            }
        }

        async function generateMonthly() {
            const month = prompt('Nhập tháng (1-12):');
            const year = prompt('Nhập năm (VD: 2025):');

            if (!month || !year) return;

            if (month < 1 || month > 12) {
                alert('Tháng không hợp lệ!');
                return;
            }

            if (!confirm(`Tạo bảng lương tháng ${month}/${year} từ dữ liệu lương ngày?`)) return;

            try {
                const res = await fetch(`${DAILY_SALARY_API}/generate-monthly`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ thang: parseInt(month), nam: parseInt(year) })
                });

                const result = await res.json();
                if (result.success) {
                    alert('✅ ' + result.message);
                } else {
                    alert('❌ ' + result.message);
                }
            } catch (err) {
                console.error('Error:', err);
                alert('Lỗi kết nối server!');
            }
        }
    </script>
</body>
</html>
