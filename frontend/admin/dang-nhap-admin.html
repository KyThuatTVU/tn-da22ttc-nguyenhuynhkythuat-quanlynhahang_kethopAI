<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Admin - Nhà hàng Phương Nam</title>
    <link rel="icon" type="image/png" href="../images/Green Simple Clean Vegan Food Logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 min-h-screen">
    <div class="min-h-screen flex items-center justify-center py-8 sm:py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full">
            <!-- Logo -->
            <div class="text-center mb-6 sm:mb-8">
                <div class="inline-flex items-center space-x-2 sm:space-x-3">
                    <img src="../images/Green Simple Clean Vegan Food Logo.png" alt="Logo"
                        class="w-12 h-12 sm:w-14 sm:h-14 rounded-full border-2 border-orange-600 shadow-md">
                    <div class="text-left">
                        <h1 class="font-bold text-2xl sm:text-3xl text-white">Admin Panel</h1>
                        <p class="text-xs sm:text-sm text-gray-400">Phương Nam Vĩnh Long</p>
                    </div>
                </div>
            </div>

            <!-- Login Card -->
            <div class="bg-gray-800 rounded-2xl shadow-2xl p-5 sm:p-8 border border-gray-700">
                <div class="text-center mb-6 sm:mb-8">
                    <div class="inline-flex items-center justify-center w-16 h-16 sm:w-20 sm:h-20 bg-orange-600 rounded-full mb-3 sm:mb-4">
                        <i class="fas fa-shield-alt text-white text-2xl sm:text-3xl"></i>
                    </div>
                    <h2 class="text-2xl sm:text-3xl font-bold text-white mb-2">Đăng Nhập Quản Trị</h2>
                    <p class="text-gray-400 mb-2 text-sm sm:text-base">Dành cho Admin, Quản lý và Nhân viên</p>
                </div>

                <!-- Admin Google Login Button -->
                <button type="button" onclick="loginWithGoogle()"
                    class="w-full bg-white border-2 border-gray-600 text-gray-800 py-3 sm:py-4 rounded-lg font-medium text-base sm:text-lg hover:bg-gray-100 transition shadow-md flex items-center justify-center">
                    <svg class="w-6 h-6 sm:w-7 sm:h-7 mr-2 sm:mr-3" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    Đăng nhập bằng Google (Admin)
                </button>

                <!-- Link to Staff Portal -->
                <div class="mt-8 pt-6 border-t border-gray-700 text-center">
                    <p class="text-gray-400 mb-4 text-sm sm:text-base">Bạn là nhân viên nhà hàng?</p>
                    <a href="../staff/login.html" 
                        class="inline-block w-full bg-transparent border-2 border-orange-600 text-orange-500 hover:bg-orange-600 hover:text-white py-3 sm:py-4 rounded-lg font-medium text-base sm:text-lg transition shadow-md">
                        <i class="fas fa-users mr-2"></i> Chuyển đến Cổng đăng nhập Nhân viên
                    </a>
                </div>

                <!-- Alert -->
                <div id="alert-message" class="hidden p-4 rounded-lg mt-6"></div>
            </div>

            <!-- Back to Home -->
            <div class="text-center mt-6">
                <a href="../index.html" class="text-gray-400 hover:text-white transition">
                    <i class="fas fa-arrow-left mr-2"></i> Quay lại trang chủ
                </a>
            </div>
        </div>
    </div>

    <script>
        function showAlert(message, type = 'error') {
            const alertDiv = document.getElementById('alert-message');
            alertDiv.className = `p-4 rounded-lg ${type === 'success' ? 'bg-green-600' : 'bg-red-600'} text-white`;
            alertDiv.textContent = message;
            alertDiv.classList.remove('hidden');

            setTimeout(() => {
                alertDiv.classList.add('hidden');
            }, 5000);
        }

        // Google Login cho Admin
        function loginWithGoogle() {
            window.location.href = 'http://localhost:3000/api/admin-auth/google';
        }

        // Xử lý callback từ Google
        window.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const loginSuccess = urlParams.get('login');
            const error = urlParams.get('error');
            const logout = urlParams.get('logout');

            if (logout === 'success') {
                showAlert('Đã đăng xuất thành công!', 'success');
                window.history.replaceState({}, document.title, window.location.pathname);
                return;
            }

            if (error === 'not_admin') {
                showAlert('Email này không có quyền truy cập. Vui lòng liên hệ quản trị viên!', 'error');
                window.history.replaceState({}, document.title, window.location.pathname);
                return;
            }

            if (error === 'unauthorized') {
                showAlert('Vui lòng đăng nhập để tiếp tục', 'error');
                window.history.replaceState({}, document.title, window.location.pathname);
                return;
            }

            if (error === 'google_auth_failed') {
                showAlert('Đăng nhập Google thất bại. Vui lòng thử lại!', 'error');
                window.history.replaceState({}, document.title, window.location.pathname);
                return;
            }

            if (error) {
                showAlert('Có lỗi xảy ra. Vui lòng thử lại!', 'error');
                window.history.replaceState({}, document.title, window.location.pathname);
                return;
            }

            if (loginSuccess === 'success') {
                showAlert('Đăng nhập thành công! Đang chuyển hướng...', 'success');
                
                // Chuyển đến dashboard sau 500ms
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 500);
            }
        });

        async function handleStaffLogin(e) {
            e.preventDefault();
            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            const btn = document.getElementById('btnStaffLogin');

            try {
                btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Đang xử lý...';
                btn.disabled = true;

                const response = await fetch('http://localhost:3000/api/staff/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tai_khoan: usernameInput, mat_khau: passwordInput })
                });

                const data = await response.json();

                if (data.success) {
                    showAlert('Chế độ nhân viên/quản lý đăng nhập thành công!', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                } else {
                    showAlert(data.message || 'Tài khoản hoặc mật khẩu không đúng', 'error');
                }
            } catch (err) {
                console.error(err);
                showAlert('Lỗi kết nối máy chủ. Vui lòng thử lại!', 'error');
            } finally {
                btn.innerHTML = '<span>Đăng nhập hệ thống</span>';
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
