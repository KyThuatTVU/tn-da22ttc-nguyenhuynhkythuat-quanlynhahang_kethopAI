<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Album ảnh - Admin</title>
    <link rel="icon" type="image/png" href="../images/Green Simple Clean Vegan Food Logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="admin-styles.css">
    <link rel="stylesheet" href="admin-responsive.css">
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Sidebar Overlay -->
            <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
            
            <!-- Header Placeholder -->
            <div id="header-placeholder"></div>

            <main class="flex-1 overflow-y-auto p-6">
                <!-- Top Actions -->
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-slate-800">Album ảnh</h2>
                    <button onclick="openUploadModal()" class="bg-slate-800 text-white px-4 py-2 rounded-xl hover:bg-slate-900 font-medium text-sm">
                        <i class="fas fa-plus mr-2"></i>Thêm ảnh
                    </button>
                </div>

                <!-- Stats -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-5 mb-6">
                    <div class="stat-card"><div class="flex items-center justify-between"><div><p class="text-slate-500 text-sm">Tổng ảnh</p><p id="stat-total" class="text-2xl font-bold text-slate-800">0</p></div><div class="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center"><i class="fas fa-images text-slate-600 text-xl"></i></div></div></div>
                    <div class="stat-card"><div class="flex items-center justify-between"><div><p class="text-slate-500 text-sm">Món ăn</p><p id="stat-food" class="text-2xl font-bold text-amber-600">0</p></div><div class="w-12 h-12 bg-amber-100 rounded-xl flex items-center justify-center"><i class="fas fa-utensils text-amber-600 text-xl"></i></div></div></div>
                    <div class="stat-card"><div class="flex items-center justify-between"><div><p class="text-slate-500 text-sm">Không gian</p><p id="stat-space" class="text-2xl font-bold text-blue-600">0</p></div><div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center"><i class="fas fa-store text-blue-600 text-xl"></i></div></div></div>
                    <div class="stat-card"><div class="flex items-center justify-between"><div><p class="text-slate-500 text-sm">Sự kiện</p><p id="stat-event" class="text-2xl font-bold text-emerald-600">0</p></div><div class="w-12 h-12 bg-emerald-100 rounded-xl flex items-center justify-center"><i class="fas fa-calendar-alt text-emerald-600 text-xl"></i></div></div></div>
                </div>

                <!-- Filters -->
                <div class="content-card mb-6">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <input type="text" id="search-filter" placeholder="Tìm theo mô tả..." class="px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500">
                        <select id="type-filter" class="px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500">
                            <option value="">Tất cả loại ảnh</option>
                            <option value="mon_an">Món ăn</option>
                            <option value="khong_gian">Không gian</option>
                            <option value="su_kien">Sự kiện</option>
                            <option value="khac">Khác</option>
                        </select>
                        <input type="date" id="date-filter" class="px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500">
                        <button onclick="applyFilters()" class="bg-slate-800 text-white px-4 py-2.5 rounded-xl hover:bg-slate-900"><i class="fas fa-filter mr-2"></i>Lọc</button>
                    </div>
                </div>

                <!-- Albums Grid -->
                <div id="albums-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                    <div class="col-span-full text-center py-12"><i class="fas fa-spinner fa-spin text-4xl text-slate-400 mb-4"></i><p class="text-slate-500">Đang tải...</p></div>
                </div>
            </main>
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="upload-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-2xl w-full">
            <div class="p-6 border-b flex items-center justify-between bg-gradient-to-r from-slate-800 to-slate-700 text-white rounded-t-2xl">
                <h3 class="text-xl font-bold">Tải ảnh lên</h3>
                <button onclick="closeModal()" class="text-white/70 hover:text-white"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="upload-form" class="p-6 space-y-4">
                <div><label class="block text-sm font-medium text-slate-700 mb-2">Chọn ảnh *</label><input type="file" id="images" name="images" accept="image/*" multiple required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl"><p class="text-xs text-slate-500 mt-1">Có thể chọn nhiều ảnh</p></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-2">Loại ảnh *</label><select id="loai_anh" name="loai_anh" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500"><option value="">Chọn loại ảnh</option><option value="mon_an">Món ăn</option><option value="khong_gian">Không gian</option><option value="su_kien">Sự kiện</option><option value="khac">Khác</option></select></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-2">Mô tả</label><textarea id="mo_ta" name="mo_ta" rows="3" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500"></textarea></div>
                <div class="flex justify-end space-x-3 pt-4">
                    <button type="button" onclick="closeModal()" class="px-6 py-2.5 border border-slate-200 rounded-xl hover:bg-slate-50">Hủy</button>
                    <button type="submit" class="bg-slate-800 text-white px-6 py-2.5 rounded-xl hover:bg-slate-900 font-medium">Tải lên</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Image Preview Modal -->
    <div id="preview-modal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
        <div class="max-w-4xl w-full">
            <div class="flex justify-end mb-4"><button onclick="closePreview()" class="text-white hover:text-slate-300"><i class="fas fa-times text-3xl"></i></button></div>
            <img id="preview-image" src="" alt="" class="w-full h-auto rounded-2xl">
            <div id="preview-info" class="mt-4 text-white text-center"></div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full">
            <div class="p-6 border-b flex items-center justify-between bg-gradient-to-r from-slate-800 to-slate-700 text-white rounded-t-2xl">
                <h3 class="text-xl font-bold">Chỉnh sửa ảnh</h3>
                <button onclick="closeEditModal()" class="text-white/70 hover:text-white"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="edit-form" class="p-6 space-y-4" enctype="multipart/form-data">
                <input type="hidden" id="edit-id" name="id">
                <div class="text-center mb-4">
                    <img id="edit-preview" src="" alt="" class="w-48 h-48 object-cover rounded-xl mx-auto border-2 border-slate-200">
                    <label class="mt-3 inline-flex items-center px-4 py-2 bg-blue-50 text-blue-600 rounded-xl cursor-pointer hover:bg-blue-100 transition">
                        <i class="fas fa-camera mr-2"></i>
                        <span>Thay đổi ảnh</span>
                        <input type="file" id="edit-image" name="image" accept="image/*" class="hidden" onchange="previewEditImage(this)">
                    </label>
                    <p class="text-xs text-slate-400 mt-1">Để trống nếu không muốn thay đổi ảnh</p>
                </div>
                <div><label class="block text-sm font-medium text-slate-700 mb-2">Loại ảnh *</label><select id="edit-loai_anh" name="loai_anh" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500"><option value="mon_an">Món ăn</option><option value="khong_gian">Không gian</option><option value="su_kien">Sự kiện</option><option value="khac">Khác</option></select></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-2">Mô tả</label><textarea id="edit-mo_ta" name="mo_ta" rows="3" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500"></textarea></div>
                <div class="flex justify-end space-x-3 pt-4">
                    <button type="button" onclick="closeEditModal()" class="px-6 py-2.5 border border-slate-200 rounded-xl hover:bg-slate-50">Hủy</button>
                    <button type="submit" class="bg-slate-800 text-white px-6 py-2.5 rounded-xl hover:bg-slate-900 font-medium">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin-layout.js"></script>
    <script src="admin-mobile.js"></script>

    <script>
        let albums = [];

        function formatDateVN(dateString) {
            if (!dateString) return 'N/A';
            // Backend trả về format: "YYYY-MM-DD HH:mm:ss" hoặc "YYYY-MM-DD"
            const datePart = dateString.split(' ')[0]; // Lấy phần date
            const parts = datePart.split('-');
            if (parts.length === 3) {
                return `${parts[2]}/${parts[1]}/${parts[0]}`; // DD/MM/YYYY
            }
            return 'N/A';
        }
        function getImageUrl(path) {
            if (!path) return 'https://via.placeholder.com/300';
            if (path.startsWith('http')) return path;
            const base = API_URL.replace('/api', '');
            // Đã có sẵn đường dẫn /images/ hoặc images/
            if (path.startsWith('/images/') || path.startsWith('images/')) {
                return `${base}/${path.replace(/^\//, '')}`;
            }
            // Chỉ có tên file -> ảnh nằm trong thư mục /images/
            return `${base}/images/${path.replace(/^\//, '')}`;
        }

        async function loadAlbums() {
            try {
                const res = await fetch(`${API_URL}/albums?limit=100`, { credentials: 'include' });
                albums = (await res.json()).data || [];
                updateStats();
                renderAlbums(albums);
            } catch (e) { console.error(e); }
        }

        function updateStats() {
            document.getElementById('stat-total').textContent = albums.length;
            document.getElementById('stat-food').textContent = albums.filter(a => a.loai_anh === 'mon_an').length;
            document.getElementById('stat-space').textContent = albums.filter(a => a.loai_anh === 'khong_gian').length;
            document.getElementById('stat-event').textContent = albums.filter(a => a.loai_anh === 'su_kien').length;
        }

        function renderAlbums(items) {
            const container = document.getElementById('albums-container');
            if (items.length === 0) { container.innerHTML = `<div class="col-span-full text-center py-12">Chưa có ảnh</div>`; return; }
            const typeName = { 'mon_an': 'Món ăn', 'khong_gian': 'Không gian', 'su_kien': 'Sự kiện', 'khac': 'Khác' };
            container.innerHTML = items.map(album => `
                <div class="group relative bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-lg transition">
                    <div class="aspect-square"><img src="${getImageUrl(album.duong_dan_anh)}" class="w-full h-full object-cover cursor-pointer" onclick="previewImage(${album.ma_album})"></div>
                    <div class="absolute inset-0 bg-black/0 group-hover:bg-black/50 transition flex items-center justify-center opacity-0 group-hover:opacity-100">
                        <div class="flex space-x-2">
                            <button onclick="previewImage(${album.ma_album})" class="bg-white text-slate-800 p-2 rounded-xl"><i class="fas fa-eye"></i></button>
                            <button onclick="editAlbum(${album.ma_album})" class="bg-blue-500 text-white p-2 rounded-xl"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteAlbum(${album.ma_album})" class="bg-red-500 text-white p-2 rounded-xl"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="p-3">
                        <span class="text-xs px-2 py-1 rounded-lg bg-slate-100 font-medium">${typeName[album.loai_anh] || 'Khác'}</span>
                        <p class="text-xs text-slate-500 mt-1 truncate">${album.mo_ta || ''}</p>
                    </div>
                </div>`).join('');
        }

        function openUploadModal() { document.getElementById('upload-form').reset(); document.getElementById('upload-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('upload-modal').classList.add('hidden'); }
        function closePreview() { document.getElementById('preview-modal').classList.add('hidden'); }
        function closeEditModal() { document.getElementById('edit-modal').classList.add('hidden'); }

        function previewImage(id) {
            const a = albums.find(x => x.ma_album === id);
            if (!a) return;
            document.getElementById('preview-image').src = getImageUrl(a.duong_dan_anh);
            document.getElementById('preview-info').innerHTML = `<p class="font-bold">${a.mo_ta || ''}</p><p class="text-xs mt-1">Ngày: ${formatDateVN(a.ngay_tao)}</p>`;
            document.getElementById('preview-modal').classList.remove('hidden');
        }

        function editAlbum(id) {
            const a = albums.find(x => x.ma_album === id);
            if (!a) return;
            document.getElementById('edit-id').value = a.ma_album;
            document.getElementById('edit-loai_anh').value = a.loai_anh || 'khac';
            document.getElementById('edit-mo_ta').value = a.mo_ta || '';
            document.getElementById('edit-preview').src = getImageUrl(a.duong_dan_anh);
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function previewEditImage(input) { if (input.files && input.files[0]) { const r = new FileReader(); r.onload = e => document.getElementById('edit-preview').src = e.target.result; r.readAsDataURL(input.files[0]); } }

        async function deleteAlbum(id) {
            if (!confirm('Xóa ảnh này?')) return;
            try { const res = await fetch(`${API_URL}/albums/${id}`, { method: 'DELETE', credentials: 'include' }); if ((await res.json()).success) loadAlbums(); } catch (e) { console.error(e); }
        }

        document.getElementById('upload-form').addEventListener('submit', async e => {
            e.preventDefault();
            const fd = new FormData(e.target);
            for (let f of document.getElementById('images').files) fd.append('images', f);
            try { const res = await fetch(`${API_URL}/albums`, { method: 'POST', body: fd, credentials: 'include' }); if ((await res.json()).success) { closeModal(); loadAlbums(); } } catch (e) { console.error(e); }
        });

        document.getElementById('edit-form').addEventListener('submit', async e => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const fd = new FormData(e.target);
            const f = document.getElementById('edit-image').files[0];
            if (f) fd.append('image', f);
            try { const res = await fetch(`${API_URL}/albums/${id}`, { method: 'PUT', body: fd, credentials: 'include' }); if ((await res.json()).success) { closeEditModal(); loadAlbums(); } } catch (e) { console.error(e); }
        });

        function applyFilters() {
            const s = document.getElementById('search-filter').value.toLowerCase();
            const t = document.getElementById('type-filter').value;
            const d = document.getElementById('date-filter').value;
            renderAlbums(albums.filter(a => (!s || (a.mo_ta && a.mo_ta.toLowerCase().includes(s))) && (!t || a.loai_anh === t) && (!d || (a.ngay_tao && a.ngay_tao.startsWith(d)))));
        }

        loadAlbums();
    </script>
</body>
</html>
