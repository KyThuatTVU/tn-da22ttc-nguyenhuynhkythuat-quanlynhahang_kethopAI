<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Bình luận Tin tức - Admin</title>
    <link rel="icon" type="image/png" href="../images/Green Simple Clean Vegan Food Logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="admin-styles.css">
    <link rel="stylesheet" href="admin-responsive.css">
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Sidebar Overlay -->
            <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
            
            <!-- Header Placeholder -->
            <div id="header-placeholder"></div>

            <main class="flex-1 overflow-y-auto p-6">
                <!-- Stats -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                    <div class="content-card">
                        <div class="flex items-center justify-between">
                            <div><p class="text-sm text-slate-500">Tổng bình luận</p><p class="text-2xl font-bold text-slate-800" id="stat-total">0</p></div>
                            <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center"><i class="fas fa-comments text-blue-600 text-xl"></i></div>
                        </div>
                    </div>
                    <div class="content-card">
                        <div class="flex items-center justify-between">
                            <div><p class="text-sm text-slate-500">Đã duyệt</p><p class="text-2xl font-bold text-green-600" id="stat-approved">0</p></div>
                            <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center"><i class="fas fa-check text-green-600 text-xl"></i></div>
                        </div>
                    </div>
                    <div class="content-card">
                        <div class="flex items-center justify-between">
                            <div><p class="text-sm text-slate-500">Chờ duyệt</p><p class="text-2xl font-bold text-yellow-600" id="stat-pending">0</p></div>
                            <div class="w-12 h-12 bg-yellow-100 rounded-xl flex items-center justify-center"><i class="fas fa-clock text-yellow-600 text-xl"></i></div>
                        </div>
                    </div>
                    <div class="content-card">
                        <div class="flex items-center justify-between">
                            <div><p class="text-sm text-slate-500">Đã từ chối</p><p class="text-2xl font-bold text-red-600" id="stat-rejected">0</p></div>
                            <div class="w-12 h-12 bg-red-100 rounded-xl flex items-center justify-center"><i class="fas fa-times text-red-600 text-xl"></i></div>
                        </div>
                    </div>
                </div>

                <!-- Filters -->
                <div class="content-card mb-6">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <input type="text" id="search" placeholder="Tìm kiếm bình luận..." class="px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500">
                        <select id="status-filter" class="px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500">
                            <option value="">Tất cả trạng thái</option>
                            <option value="approved">Đã duyệt</option>
                            <option value="pending">Chờ duyệt</option>
                            <option value="rejected">Đã từ chối</option>
                        </select>
                        <select id="news-filter" class="px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500">
                            <option value="">Tất cả tin tức</option>
                        </select>
                        <button onclick="applyFilters()" class="bg-slate-800 text-white px-4 py-2.5 rounded-xl hover:bg-slate-900"><i class="fas fa-filter mr-2"></i>Lọc</button>
                    </div>
                </div>

                <!-- Comments Table -->
                <div class="content-card">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="border-b border-slate-200">
                                    <th class="text-left py-4 px-4 text-sm font-semibold text-slate-600">Người bình luận</th>
                                    <th class="text-left py-4 px-4 text-sm font-semibold text-slate-600">Nội dung</th>
                                    <th class="text-left py-4 px-4 text-sm font-semibold text-slate-600">Tin tức</th>
                                    <th class="text-left py-4 px-4 text-sm font-semibold text-slate-600">Trạng thái</th>
                                    <th class="text-left py-4 px-4 text-sm font-semibold text-slate-600">Ngày</th>
                                    <th class="text-center py-4 px-4 text-sm font-semibold text-slate-600">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="comments-table">
                                <tr><td colspan="6" class="text-center py-12 text-slate-500"><i class="fas fa-spinner fa-spin text-2xl mb-2"></i><p>Đang tải...</p></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Detail Modal - Xem comment và replies -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b flex items-center justify-between bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-t-2xl">
                <h3 class="text-xl font-bold"><i class="fas fa-comments mr-2"></i>Chi tiết bình luận & trả lời</h3>
                <button onclick="closeDetailModal()" class="text-white/70 hover:text-white"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div id="detail-content" class="p-6"></div>
        </div>
    </div>

    <!-- Reply Modal -->
    <div id="reply-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full">
            <div class="p-6 border-b flex items-center justify-between bg-gradient-to-r from-green-600 to-green-700 text-white rounded-t-2xl">
                <h3 class="text-xl font-bold"><i class="fas fa-reply mr-2"></i>Trả lời bình luận</h3>
                <button onclick="closeReplyModal()" class="text-white/70 hover:text-white"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-6">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-700 mb-2">Nội dung trả lời</label>
                    <textarea id="reply-content" 
                              class="w-full border border-slate-300 rounded-lg p-3 focus:ring-2 focus:ring-green-500 focus:border-transparent" 
                              rows="5" 
                              placeholder="Nhập nội dung trả lời cho khách hàng..."></textarea>
                    <p class="text-xs text-slate-500 mt-1">Câu trả lời sẽ hiển thị với tên "Admin" trên trang người dùng</p>
                </div>
                <div class="flex gap-2">
                    <button type="button" onclick="event.preventDefault(); submitReply()" 
                            class="flex-1 bg-green-600 text-white px-4 py-2.5 rounded-lg hover:bg-green-700 font-medium">
                        <i class="fas fa-paper-plane mr-2"></i>Gửi trả lời
                    </button>
                    <button type="button" onclick="event.preventDefault(); closeReplyModal()" 
                            class="px-4 py-2.5 bg-slate-200 text-slate-700 rounded-lg hover:bg-slate-300 font-medium">
                        Hủy
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="admin-layout.js"></script>
    <script src="admin-mobile.js"></script>
    <script src="../js/admin-comments.js"></script>
</body>
</html>
