<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Khuyến mãi - Admin</title>
    <link rel="icon" type="image/png" href="../images/Green Simple Clean Vegan Food Logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="admin-styles.css">
    <link rel="stylesheet" href="admin-responsive.css">
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Sidebar Overlay -->
            <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
            
            <!-- Header Placeholder -->
            <div id="header-placeholder"></div>

            <main class="flex-1 overflow-y-auto p-4 sm:p-6">
                <!-- Top Actions -->
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-slate-800">Mã giảm giá</h2>
                    <button onclick="openModal()" class="bg-slate-800 text-white px-4 py-2 rounded-xl hover:bg-slate-900 font-medium text-sm">
                        <i class="fas fa-plus mr-2"></i>Thêm mã
                    </button>
                </div>

                <!-- Stats -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 sm:gap-5 mb-4 sm:mb-6">
                    <div class="stat-card"><div class="flex items-center justify-between"><div><p class="text-slate-500 text-xs sm:text-sm">Tổng mã</p><p id="stat-total" class="text-xl sm:text-2xl font-bold text-slate-800">0</p></div><div class="w-10 h-10 sm:w-12 sm:h-12 bg-slate-100 rounded-xl flex items-center justify-center"><i class="fas fa-ticket-alt text-slate-600 text-base sm:text-xl"></i></div></div></div>
                    <div class="stat-card"><div class="flex items-center justify-between"><div><p class="text-slate-500 text-xs sm:text-sm">Đang hoạt động</p><p id="stat-active" class="text-xl sm:text-2xl font-bold text-green-600">0</p></div><div class="w-10 h-10 sm:w-12 sm:h-12 bg-green-100 rounded-xl flex items-center justify-center"><i class="fas fa-check-circle text-green-600 text-base sm:text-xl"></i></div></div></div>
                    <div class="stat-card"><div class="flex items-center justify-between"><div><p class="text-slate-500 text-xs sm:text-sm">Đã hết hạn</p><p id="stat-expired" class="text-xl sm:text-2xl font-bold text-red-600">0</p></div><div class="w-10 h-10 sm:w-12 sm:h-12 bg-red-100 rounded-xl flex items-center justify-center"><i class="fas fa-times-circle text-red-600 text-base sm:text-xl"></i></div></div></div>
                    <div class="stat-card"><div class="flex items-center justify-between"><div><p class="text-slate-500 text-xs sm:text-sm">Lượt sử dụng</p><p id="stat-used" class="text-xl sm:text-2xl font-bold text-blue-600">0</p></div><div class="w-10 h-10 sm:w-12 sm:h-12 bg-blue-100 rounded-xl flex items-center justify-center"><i class="fas fa-chart-line text-blue-600 text-base sm:text-xl"></i></div></div></div>
                </div>

                <!-- Table -->
                <div class="content-card">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="border-b">
                                    <th class="text-left py-3 px-4 font-semibold text-slate-600">Mã</th>
                                    <th class="text-left py-3 px-4 font-semibold text-slate-600">Mô tả</th>
                                    <th class="text-left py-3 px-4 font-semibold text-slate-600">Giảm giá</th>
                                    <th class="text-left py-3 px-4 font-semibold text-slate-600">Đơn tối thiểu</th>
                                    <th class="text-left py-3 px-4 font-semibold text-slate-600">Thời gian</th>
                                    <th class="text-left py-3 px-4 font-semibold text-slate-600">Sử dụng</th>
                                    <th class="text-left py-3 px-4 font-semibold text-slate-600">Trạng thái</th>
                                    <th class="text-center py-3 px-4 font-semibold text-slate-600">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="promotions-table">
                                <tr><td colspan="8" class="text-center py-8 text-slate-500"><i class="fas fa-spinner fa-spin mr-2"></i>Đang tải...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal -->
    <div id="promo-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b flex items-center justify-between bg-gradient-to-r from-slate-800 to-slate-700 text-white rounded-t-2xl">
                <h3 class="text-xl font-bold" id="modal-title">Thêm mã khuyến mãi</h3>
                <button onclick="closeModal()" class="text-white/70 hover:text-white"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="promo-form" class="p-6 space-y-4">
                <input type="hidden" id="promo-id" class="no-draft">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Mã code *</label>
                        <input type="text" id="ma_code" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl uppercase" placeholder="VD: GIAM10">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Loại giảm *</label>
                        <select id="loai_giam_gia" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl">
                            <option value="percentage">Phần trăm (%)</option>
                            <option value="fixed_amount">Số tiền cố định</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Giá trị giảm *</label>
                        <input type="number" id="gia_tri" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl" placeholder="10">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Đơn tối thiểu</label>
                        <input type="number" id="don_hang_toi_thieu" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl" placeholder="100000">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Ngày bắt đầu *</label>
                        <input type="datetime-local" id="ngay_bat_dau" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Ngày kết thúc *</label>
                        <input type="datetime-local" id="ngay_ket_thuc" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Giới hạn sử dụng</label>
                    <input type="number" id="so_luong_gioi_han" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl" placeholder="Để trống = không giới hạn">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Mô tả</label>
                    <textarea id="mo_ta" rows="2" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl" placeholder="Mô tả khuyến mãi..."></textarea>
                </div>
                <div class="flex items-center">
                    <input type="checkbox" id="trang_thai" checked class="w-4 h-4 text-blue-600 rounded">
                    <label for="trang_thai" class="ml-2 text-sm text-slate-700">Kích hoạt</label>
                </div>
                <div class="flex justify-end space-x-3 pt-4">
                    <button type="button" onclick="closeModal()" class="px-6 py-2.5 border border-slate-200 rounded-xl hover:bg-slate-50">Hủy</button>
                    <button type="submit" class="bg-slate-800 text-white px-6 py-2.5 rounded-xl hover:bg-slate-900 font-medium">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin-layout.js"></script>
    <script src="admin-mobile.js"></script>
    <script src="../js/form-draft-manager.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            window.promoDraftManager = new FormDraftManager('promo-form');
        });

        let promotions = [];
        
        function restoreUiState() {
            const stateStr = sessionStorage.getItem('adminUiState_promotions');
            if (stateStr) {
                try {
                    const state = JSON.parse(stateStr);
                    if (state.action === 'add') openModal(true);
                    else if (state.action === 'edit' && state.id) editPromo(state.id, true);
                } catch (e) {}
            }
        }

        async function loadPromotions() {
            try {
                const response = await fetch(`${API_URL}/promotions`, { credentials: 'include' });
                const data = await response.json();
                promotions = data.data || [];
                updateStats();
                renderTable();
                restoreUiState();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('promotions-table').innerHTML = '<tr><td colspan="8" class="text-center py-8 text-red-500">Lỗi tải dữ liệu</td></tr>';
            }
        }
        
        function updateStats() {
            const now = new Date();
            document.getElementById('stat-total').textContent = promotions.length;
            document.getElementById('stat-active').textContent = promotions.filter(p => p.trang_thai === 1 && new Date(p.ngay_ket_thuc) >= now).length;
            document.getElementById('stat-expired').textContent = promotions.filter(p => new Date(p.ngay_ket_thuc) < now).length;
            document.getElementById('stat-used').textContent = promotions.reduce((sum, p) => sum + (p.so_luong_da_dung || 0), 0);
        }
        
        function renderTable() {
            const tbody = document.getElementById('promotions-table');
            if (promotions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-slate-500">Chưa có mã khuyến mãi</td></tr>';
                return;
            }
            
            tbody.innerHTML = promotions.map(p => {
                const now = new Date();
                const isExpired = new Date(p.ngay_ket_thuc) < now;
                const isActive = p.trang_thai === 1 && !isExpired;
                const discount = p.loai_giam_gia === 'percentage' ? `${p.gia_tri}%` : formatCurrency(p.gia_tri);
                
                return `
                    <tr class="border-b hover:bg-slate-50">
                        <td class="py-3 px-4"><span class="font-mono font-bold text-orange-600 bg-orange-50 px-2 py-1 rounded">${p.ma_code}</span></td>
                        <td class="py-3 px-4 text-sm text-slate-600 max-w-xs truncate">${p.mo_ta || '-'}</td>
                        <td class="py-3 px-4 font-semibold text-green-600">${discount}</td>
                        <td class="py-3 px-4 text-sm">${p.don_hang_toi_thieu > 0 ? formatCurrency(p.don_hang_toi_thieu) : '-'}</td>
                        <td class="py-3 px-4 text-xs text-slate-500">
                            ${formatDate(p.ngay_bat_dau)}<br>→ ${formatDate(p.ngay_ket_thuc)}
                        </td>
                        <td class="py-3 px-4 text-sm">${p.so_luong_da_dung || 0}${p.so_luong_gioi_han ? '/' + p.so_luong_gioi_han : ''}</td>
                        <td class="py-3 px-4">
                            <span class="px-2 py-1 rounded-full text-xs font-medium ${isActive ? 'bg-green-100 text-green-700' : isExpired ? 'bg-red-100 text-red-700' : 'bg-gray-100 text-gray-700'}">
                                ${isActive ? 'Hoạt động' : isExpired ? 'Hết hạn' : 'Tắt'}
                            </span>
                        </td>
                        <td class="py-3 px-4 text-center">
                            <button onclick="editPromo(${p.ma_khuyen_mai})" class="text-blue-500 hover:text-blue-700 mx-1"><i class="fas fa-edit"></i></button>
                            <button onclick="deletePromo(${p.ma_khuyen_mai})" class="text-red-500 hover:text-red-700 mx-1"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        function formatCurrency(amount) {
            return new Intl.NumberFormat('vi-VN').format(amount) + 'đ';
        }
        
        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString('vi-VN');
        }
        
        function openModal(isAutoOpen = false) {
            document.getElementById('modal-title').textContent = 'Thêm mã khuyến mãi';
            document.getElementById('promo-form').reset();
            if (window.promoDraftManager) {
                window.promoDraftManager.setContext('new');
                if (isAutoOpen && window.promoDraftManager.hasDraft()) {
                    window.promoDraftManager.restore();
                } else if (!isAutoOpen) {
                    window.promoDraftManager.clear();
                }
            }
            document.getElementById('promo-id').value = '';
            document.getElementById('trang_thai').checked = true;
            document.getElementById('promo-modal').classList.remove('hidden');
            if (!isAutoOpen) sessionStorage.setItem('adminUiState_promotions', JSON.stringify({ action: 'add' }));
        }
        
        function closeModal() {
            document.getElementById('promo-modal').classList.add('hidden');
            sessionStorage.removeItem('adminUiState_promotions');
        }
        
        function editPromo(id, isAutoOpen = false) {
            const p = promotions.find(x => x.ma_khuyen_mai === id);
            if (!p) { sessionStorage.removeItem('adminUiState_promotions'); return; }
            document.getElementById('modal-title').textContent = 'Sửa mã khuyến mãi';
            document.getElementById('promo-id').value = p.ma_khuyen_mai;
            if (window.promoDraftManager) window.promoDraftManager.setContext(id);
            document.getElementById('ma_code').value = p.ma_code;
            document.getElementById('loai_giam_gia').value = p.loai_giam_gia;
            document.getElementById('gia_tri').value = p.gia_tri;
            document.getElementById('don_hang_toi_thieu').value = p.don_hang_toi_thieu || '';
            document.getElementById('ngay_bat_dau').value = p.ngay_bat_dau ? p.ngay_bat_dau.slice(0, 16) : '';
            document.getElementById('ngay_ket_thuc').value = p.ngay_ket_thuc ? p.ngay_ket_thuc.slice(0, 16) : '';
            document.getElementById('so_luong_gioi_han').value = p.so_luong_gioi_han || '';
            document.getElementById('mo_ta').value = p.mo_ta || '';
            document.getElementById('trang_thai').checked = p.trang_thai === 1;
            document.getElementById('promo-modal').classList.remove('hidden');
            if (!isAutoOpen) sessionStorage.setItem('adminUiState_promotions', JSON.stringify({ action: 'edit', id: id }));
            if (window.promoDraftManager) {
                if (isAutoOpen && window.promoDraftManager.hasDraft()) {
                    window.promoDraftManager.restore();
                } else if (!isAutoOpen) {
                    window.promoDraftManager.clear();
                }
            }
        }
        
        async function deletePromo(id) {
            if (!confirm('Xóa mã khuyến mãi này?')) return;
            try {
                const res = await fetch(`${API_URL}/promotions/${id}`, { method: 'DELETE', credentials: 'include' });
                if ((await res.json()).success) loadPromotions();
            } catch (e) { alert('Lỗi xóa'); }
        }
        
        document.getElementById('promo-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('promo-id').value;
            const data = {
                ma_code: document.getElementById('ma_code').value,
                loai_giam_gia: document.getElementById('loai_giam_gia').value,
                gia_tri: parseFloat(document.getElementById('gia_tri').value),
                don_hang_toi_thieu: parseFloat(document.getElementById('don_hang_toi_thieu').value) || 0,
                ngay_bat_dau: document.getElementById('ngay_bat_dau').value,
                ngay_ket_thuc: document.getElementById('ngay_ket_thuc').value,
                so_luong_gioi_han: parseInt(document.getElementById('so_luong_gioi_han').value) || null,
                mo_ta: document.getElementById('mo_ta').value,
                trang_thai: document.getElementById('trang_thai').checked ? 1 : 0
            };
            try {
                const method = id ? 'PUT' : 'POST';
                const url = id ? `${API_URL}/promotions/${id}` : `${API_URL}/promotions`;
                const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify(data) });
                if ((await res.json()).success) { if (window.promoDraftManager) window.promoDraftManager.clear(); closeModal(); loadPromotions(); }
            } catch (e) { alert('Lỗi lưu'); }
        });
        
        loadPromotions();
    </script>
</body>
</html>
