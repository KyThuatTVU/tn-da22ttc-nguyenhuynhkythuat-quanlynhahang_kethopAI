<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Loại Nguyên Liệu - Admin</title>
    <link rel="icon" type="image/png" href="../images/Green Simple Clean Vegan Food Logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="admin-styles.css">
    <link rel="stylesheet" href="admin-responsive.css">
</head>
<body class="bg-slate-50">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Header Placeholder -->
            <div id="header-placeholder"></div>

            <main class="flex-1 overflow-y-auto p-6 md:p-8">
                <div class="max-w-5xl mx-auto">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                        <div>
                            <h1 class="text-3xl font-black text-slate-800 tracking-tight">Loại Nguyên Liệu</h1>
                            <p class="text-slate-500 font-medium mt-1">Phân loại hàng hóa: Rau củ, Hải sản, Thức uống...</p>
                        </div>
                        <button onclick="openAddModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-2xl font-bold flex items-center gap-2 transition-all shadow-xl shadow-indigo-100 group">
                            <div class="w-6 h-6 bg-white/20 rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform">
                                <i class="fas fa-plus text-sm"></i>
                            </div>
                            Thêm loại hàng mới
                        </button>
                    </div>

                    <!-- Categories Table -->
                    <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                        <div class="p-6 border-b bg-slate-50/50 flex items-center justify-between">
                            <h3 class="font-bold text-slate-700 flex items-center gap-2">
                                <i class="fas fa-list-ul text-indigo-500"></i>
                                Danh sách phân loại
                            </h3>
                            <div id="loading-indicator" class="hidden">
                                <i class="fas fa-spinner fa-spin text-indigo-500"></i>
                            </div>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-slate-50/50">
                                    <tr>
                                        <th class="px-8 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Mã loại</th>
                                        <th class="px-8 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Tên phân loại</th>
                                        <th class="px-8 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Hành động</th>
                                    </tr>
                                </thead>
                                <tbody id="categories-list" class="divide-y divide-slate-50">
                                    <!-- Rows will be injected here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal -->
    <div id="category-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 invisible transition-all duration-300">
        <div class="bg-white w-full max-w-md rounded-[2rem] shadow-2xl overflow-hidden transform scale-95 transition-all duration-300" id="modal-content">
            <div class="p-6 border-b flex items-center justify-between bg-slate-50">
                <h3 class="font-bold text-xl text-slate-800" id="modal-title">Thêm phân loại</h3>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-slate-200 text-slate-400 hover:text-slate-600 transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="category-form" class="p-8 space-y-6">
                <input type="hidden" id="category-id">
                <div>
                    <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest mb-2">Tên loại nguyên liệu *</label>
                    <input type="text" id="ten_loai_nglieu" required placeholder="Vd: Hải sản tươi sống..." class="w-full px-5 py-4 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all font-medium">
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 px-6 py-4 border border-slate-200 rounded-2xl font-bold text-slate-600 hover:bg-slate-50 transition-all">Hủy</button>
                    <button type="submit" class="flex-[2] px-6 py-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition-all">Lưu thay đổi</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="admin-layout.js"></script>
    <script>
        let allCategories = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadCategories();
        });

        async function loadCategories() {
            document.getElementById('loading-indicator').classList.remove('hidden');
            try {
                const res = await fetch(`${API_URL}/ingredient-categories`, { credentials: 'include' });
                const result = await res.json();
                if (result.success) {
                    allCategories = result.data;
                    renderCategories(allCategories);
                }
            } catch (err) {
                console.error(err);
            } finally {
                document.getElementById('loading-indicator').classList.add('hidden');
            }
        }

        function renderCategories(items) {
            const list = document.getElementById('categories-list');
            if (items.length === 0) {
                list.innerHTML = '<tr><td colspan="3" class="px-8 py-12 text-center text-slate-400 italic">Chưa có phân loại nào được tạo</td></tr>';
                return;
            }

            list.innerHTML = items.map(cat => `
                <tr class="hover:bg-slate-50/80 transition-colors group">
                    <td class="px-8 py-5 text-sm font-black text-slate-400 font-mono tracking-tighter">#${cat.ma_loai_nglieu}</td>
                    <td class="px-8 py-5 text-sm font-bold text-slate-700">${cat.ten_loai_nglieu}</td>
                    <td class="px-8 py-5 text-center">
                        <div class="flex items-center justify-center gap-2">
                            <button onclick="openEditModal(${JSON.stringify(cat).replace(/"/g, '&quot;')})" class="w-9 h-9 rounded-lg bg-indigo-50 text-indigo-600 flex items-center justify-center hover:bg-indigo-600 hover:text-white transition-all shadow-sm">
                                <i class="fas fa-edit text-xs"></i>
                            </button>
                            <button onclick="deleteCategory(${cat.ma_loai_nglieu})" class="w-9 h-9 rounded-lg bg-rose-50 text-rose-600 flex items-center justify-center hover:bg-rose-600 hover:text-white transition-all shadow-sm">
                                <i class="fas fa-trash-alt text-xs"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function openAddModal() {
            document.getElementById('modal-title').textContent = 'Thêm phân loại mới';
            document.getElementById('category-id').value = '';
            document.getElementById('category-form').reset();
            const modal = document.getElementById('category-modal');
            const content = document.getElementById('modal-content');
            modal.classList.remove('invisible', 'opacity-0');
            content.classList.remove('scale-95');
        }

        function openEditModal(cat) {
            document.getElementById('modal-title').textContent = 'Sửa phân loại';
            document.getElementById('category-id').value = cat.ma_loai_nglieu;
            document.getElementById('ten_loai_nglieu').value = cat.ten_loai_nglieu;
            const modal = document.getElementById('category-modal');
            const content = document.getElementById('modal-content');
            modal.classList.remove('invisible', 'opacity-0');
            content.classList.remove('scale-95');
        }

        function closeModal() {
            const modal = document.getElementById('category-modal');
            const content = document.getElementById('modal-content');
            modal.classList.add('invisible', 'opacity-0');
            content.classList.add('scale-95');
        }

        document.getElementById('category-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('category-id').value;
            const ten_loai_nglieu = document.getElementById('ten_loai_nglieu').value;
            
            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/ingredient-categories/${id}` : `${API_URL}/ingredient-categories`;
            
            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ten_loai_nglieu }),
                    credentials: 'include'
                });
                const result = await res.json();
                if (result.success) {
                    closeModal();
                    loadCategories();
                } else {
                    alert(result.message);
                }
            } catch (err) {
                console.error(err);
                alert('Lỗi hệ thống');
            }
        });

        async function deleteCategory(id) {
            if (!confirm('Bạn có chắc chắn muốn xóa loại hàng này?')) return;
            try {
                const res = await fetch(`${API_URL}/ingredient-categories/${id}`, {
                    method: 'DELETE',
                    credentials: 'include'
                });
                const result = await res.json();
                if (result.success) {
                    loadCategories();
                } else {
                    alert(result.message);
                }
            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>
</html>
