<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Tài Khoản Admin - Nhà hàng Phương Nam</title>
    <link rel="icon" type="image/png" href="../images/Green Simple Clean Vegan Food Logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="admin-styles.css">
    <link rel="stylesheet" href="admin-responsive.css">
    <!-- Auth Check Script - Kiểm tra đăng nhập -->

</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-placeholder"></div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <!-- Dashboard Header Placeholder -->
        <div id="header-placeholder"></div>

        <!-- Content -->
        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-4 sm:p-6 lg:p-8">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Quản lý Tài khoản Admin</h2>
                    <p class="text-sm text-gray-500 mt-1">Quản lý các tài khoản quản trị hệ thống cấp cao</p>
                </div>
                <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center transition">
                    <i class="fas fa-plus mr-2"></i>
                    <span>Thêm Admin</span>
                </button>
            </div>

            <!-- Admins Table -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full whitespace-nowrap">
                        <thead class="bg-gray-50/50 border-b border-gray-100">
                            <tr>
                                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Tài Khoản</th>
                                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Họ Tên</th>
                                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Email</th>
                                <th class="px-6 py-4 text-center text-xs font-semibold text-gray-500 uppercase">Quyền</th>
                                <th class="px-6 py-4 text-right text-xs font-semibold text-gray-500 uppercase">Thao Tác</th>
                            </tr>
                        </thead>
                        <tbody id="adminsTableBody" class="divide-y divide-gray-100">
                            <!-- Data will be loaded here -->
                            <tr>
                                <td colspan="5" class="px-6 py-8 text-center text-gray-500">
                                    <i class="fas fa-spinner fa-spin mr-2"></i> Đang tải dữ liệu...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Form -->
    <div id="adminModal" class="hidden fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" onclick="closeModal()"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <form id="adminForm" onsubmit="handleSaveAdmin(event)">
                    <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                        <div class="mb-4 flex justify-between items-center">
                            <h3 class="text-lg leading-6 font-bold text-gray-900" id="modalTitle">Thêm Tài Khoản Admin</h3>
                            <button type="button" onclick="closeModal()" class="text-gray-400 hover:text-gray-500">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Tài khoản đăng nhập *</label>
                                <input type="text" id="tai_khoan" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                            </div>
                            <div id="passwordGroup">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu *</label>
                                <input type="password" id="mat_khau" minlength="6" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                                <p class="text-xs text-gray-500 mt-1">Tối thiểu 6 ký tự</p>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Tên hiển thị</label>
                                <input type="text" id="ten_hien_thi" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                <input type="email" id="email" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Loại Quyền</label>
                                <select id="quyen" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                                    <option value="admin">Admin thường</option>
                                    <option value="superadmin">Super Admin (Toàn quyền)</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse border-t border-gray-100">
                        <button type="submit" id="btnSave" class="w-full inline-flex justify-center rounded-lg border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none sm:ml-3 sm:w-auto sm:text-sm transition">
                            Lưu tài khoản
                        </button>
                        <button type="button" onclick="closeModal()" class="mt-3 w-full inline-flex justify-center rounded-lg border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm transition">
                            Hủy bỏ
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div id="changePasswordModal" class="hidden fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" onclick="closePasswordModal()"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <form id="changePasswordForm" onsubmit="handleChangePassword(event)">
                    <input type="hidden" id="changePwAdminId">
                    <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                        <div class="mb-4 flex justify-between items-center">
                            <h3 class="text-lg leading-6 font-bold text-gray-900">Đổi Mật Khẩu</h3>
                            <button type="button" onclick="closePasswordModal()" class="text-gray-400 hover:text-gray-500">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu mới *</label>
                            <input type="password" id="new_password" required minlength="6" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                        </div>
                    </div>
                    <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse border-t border-gray-100">
                        <button type="submit" class="w-full inline-flex justify-center rounded-lg border border-transparent shadow-sm px-4 py-2 bg-yellow-500 text-base font-medium text-white hover:bg-yellow-600 focus:outline-none sm:ml-3 sm:w-auto sm:text-sm transition">
                            Đổi mật khẩu
                        </button>
                        <button type="button" onclick="closePasswordModal()" class="mt-3 w-full inline-flex justify-center rounded-lg border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm transition">
                            Hủy
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/api-client.js"></script>
    <script src="admin-layout.js"></script>
    <script>
        // Kiểm tra quyền truy cập ngay khi load trang
        async function checkAdminAccess() {
            // Kiểm tra xem có phải admin không
            const staffUser = sessionStorage.getItem('staff_user');
            if (staffUser) {
                // Đang đăng nhập bằng tài khoản nhân viên
                Swal.fire({
                    icon: 'warning',
                    title: 'Không có quyền truy cập',
                    html: 'Trang này chỉ dành cho <strong>Admin</strong>.<br>Bạn đang đăng nhập bằng tài khoản <strong>Nhân viên</strong>.',
                    confirmButtonText: 'Quay lại Dashboard',
                    allowOutsideClick: false
                }).then(() => {
                    window.location.href = 'dashboard.html';
                });
                return false;
            }
            return true;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const hasAccess = await checkAdminAccess();
            if (hasAccess) {
                loadAdmins();
            }
        });

        async function loadAdmins() {
            try {
                const response = await fetch('http://localhost:3000/api/admins', {
                    credentials: 'include' // Sử dụng session thay vì token
                });
                const result = await response.json();
                
                const tbody = document.getElementById('adminsTableBody');
                
                // Kiểm tra lỗi authentication
                if (response.status === 401) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="5" class="px-6 py-8 text-center">
                                <div class="text-red-500 mb-4">
                                    <i class="fas fa-lock text-4xl mb-2"></i>
                                    <p class="font-semibold">Chưa đăng nhập Admin</p>
                                    <p class="text-sm text-gray-600 mt-2">Trang này chỉ dành cho Admin. Vui lòng đăng nhập bằng tài khoản Admin.</p>
                                </div>
                                <a href="dang-nhap-admin.html" class="inline-block mt-4 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                                    <i class="fas fa-sign-in-alt mr-2"></i>Đăng nhập Admin
                                </a>
                            </td>
                        </tr>
                    `;
                    return;
                }
                
                if (!response.ok || !result.success) {
                    throw new Error(result.message || 'Lỗi tải danh sách admin');
                }

                if (result.data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">Chưa có tài khoản admin.</td></tr>`;
                    return;
                }

                tbody.innerHTML = result.data.map(admin => `
                    <tr class="hover:bg-gray-50/50 transition">
                        <td class="px-6 py-4">
                            <div class="font-medium text-gray-800">${admin.tai_khoan}</div>
                        </td>
                        <td class="px-6 py-4 text-gray-600">${admin.ten_hien_thi || '-'}</td>
                        <td class="px-6 py-4 text-gray-500">${admin.email || '-'}</td>
                        <td class="px-6 py-4 text-center">
                            <span class="px-2 py-1 rounded-full text-xs font-semibold ${admin.quyen === 'superadmin' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}">
                                ${admin.quyen === 'superadmin' ? 'Super Admin' : 'Admin'}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right space-x-2">
                            <button onclick="openPasswordModal(${admin.ma_admin})" class="p-2 text-yellow-500 hover:bg-yellow-50 rounded-lg transition" title="Đổi mật khẩu">
                                <i class="fas fa-key"></i>
                            </button>
                            <button onclick="deleteAdmin(${admin.ma_admin}, '${admin.tai_khoan}')" class="p-2 text-red-500 hover:bg-red-50 rounded-lg transition" title="Xóa tài khoản">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');

            } catch (error) {
                console.error(error);
                document.getElementById('adminsTableBody').innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-red-500"><i class="fas fa-exclamation-circle mr-2"></i>Không thể tải danh sách tài khoản.</td></tr>`;
                Swal.fire('Lỗi', 'Không thể tải danh sách tài khoản!', 'error');
            }
        }

        function openModal() {
            document.getElementById('adminForm').reset();
            document.getElementById('adminModal').classList.remove('hidden');
            document.getElementById('mat_khau').required = true;
        }

        function closeModal() {
            document.getElementById('adminModal').classList.add('hidden');
        }

        async function handleSaveAdmin(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSave');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Đang xử lý...';
            btn.disabled = true;

            const payload = {
                tai_khoan: document.getElementById('tai_khoan').value,
                mat_khau: document.getElementById('mat_khau').value,
                ten_hien_thi: document.getElementById('ten_hien_thi').value,
                email: document.getElementById('email').value,
                quyen: document.getElementById('quyen').value
            };

            try {
                const response = await fetch('http://localhost:3000/api/admins', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include', // Sử dụng session
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (response.ok && result.success) {
                    closeModal();
                    Swal.fire('Thành công', 'Đã thêm tài khoản admin.', 'success');
                    loadAdmins();
                } else {
                    Swal.fire('Lỗi', result.message || 'Không thể lưu tài khoản', 'error');
                }
            } catch (error) {
                Swal.fire('Lỗi', 'Có lỗi kết nối máy chủ', 'error');
            } finally {
                btn.innerHTML = 'Lưu tài khoản';
                btn.disabled = false;
            }
        }

        // Change Password
        function openPasswordModal(id) {
            document.getElementById('changePasswordForm').reset();
            document.getElementById('changePwAdminId').value = id;
            document.getElementById('changePasswordModal').classList.remove('hidden');
        }

        function closePasswordModal() {
            document.getElementById('changePasswordModal').classList.add('hidden');
        }

        async function handleChangePassword(e) {
            e.preventDefault();
            const id = document.getElementById('changePwAdminId').value;
            const newPassword = document.getElementById('new_password').value;

            try {
                const response = await fetch(`http://localhost:3000/api/admins/${id}/password`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include', // Sử dụng session
                    body: JSON.stringify({ mat_khau_moi: newPassword })
                });
                const result = await response.json();

                if (response.ok && result.success) {
                    closePasswordModal();
                    Swal.fire('Thành công', 'Đổi mật khẩu thành công.', 'success');
                } else {
                    Swal.fire('Lỗi', result.message || 'Không thể đổi mật khẩu', 'error');
                }
            } catch (error) {
                Swal.fire('Lỗi', 'Lỗi kết nối máy chủ', 'error');
            }
        }

        function deleteAdmin(id, username) {
            Swal.fire({
                title: 'Xóa tài khoản này?',
                text: `Bạn có chắc chắn muốn xóa admin: ${username}`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#6b7280',
                confirmButtonText: 'Đồng ý xóa',
                cancelButtonText: 'Hủy'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        const response = await fetch(`http://localhost:3000/api/admins/${id}`, {
                            method: 'DELETE',
                            credentials: 'include' // Sử dụng session
                        });
                        const rs = await response.json();

                        if (response.ok && rs.success) {
                            Swal.fire('Đã xóa', 'Tài khoản đã bị xóa khỏi hệ thống.', 'success');
                            loadAdmins();
                        } else {
                            Swal.fire('Lỗi', rs.message || 'Không thể xóa tài khoản này.', 'error');
                        }
                    } catch (error) {
                        Swal.fire('Lỗi', 'Lỗi kết nối máy chủ', 'error');
                    }
                }
            });
        }
    </script>
</body>
</html>
