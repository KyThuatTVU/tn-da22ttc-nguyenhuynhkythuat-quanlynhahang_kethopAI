<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Nhân viên - Phương Nam</title>
    <link rel="icon" type="image/png" href="../images/Green Simple Clean Vegan Food Logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .input-field {
            transition: all 0.3s ease;
        }
        .input-field:focus {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.5);
        }
        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <!-- Background Decoration -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-20 left-10 w-72 h-72 bg-purple-300 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-pulse"></div>
        <div class="absolute top-40 right-10 w-72 h-72 bg-yellow-300 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-pulse animation-delay-2000"></div>
        <div class="absolute -bottom-8 left-20 w-72 h-72 bg-pink-300 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-pulse animation-delay-4000"></div>
    </div>

    <!-- Login Card -->
    <div class="login-card rounded-3xl p-8 md:p-12 w-full max-w-md relative z-10">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-block floating">
                <img src="../images/Green Simple Clean Vegan Food Logo.png" 
                     alt="Logo" 
                     class="w-24 h-24 mx-auto rounded-full border-4 border-purple-500 shadow-lg">
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mt-6">Cổng Nhân viên</h1>
            <p class="text-gray-600 mt-2">Nhà hàng Phương Nam Vĩnh Long</p>
            <div class="flex items-center justify-center gap-2 mt-4">
                <span class="px-3 py-1 bg-purple-100 text-purple-700 rounded-full text-xs font-semibold">
                    <i class="fas fa-users mr-1"></i>Quản lý
                </span>
                <span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-semibold">
                    <i class="fas fa-utensils mr-1"></i>Phục vụ
                </span>
                <span class="px-3 py-1 bg-orange-100 text-orange-700 rounded-full text-xs font-semibold">
                    <i class="fas fa-fire mr-1"></i>Bếp
                </span>
            </div>
        </div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">
            <!-- Username -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    <i class="fas fa-user mr-2 text-purple-600"></i>Tên đăng nhập
                </label>
                <input type="text" 
                       id="username" 
                       required
                       class="input-field w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-purple-500"
                       placeholder="Nhập tên đăng nhập">
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    <i class="fas fa-lock mr-2 text-purple-600"></i>Mật khẩu
                </label>
                <div class="relative">
                    <input type="password" 
                           id="password" 
                           required
                           class="input-field w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-purple-500"
                           placeholder="Nhập mật khẩu">
                    <button type="button" 
                            onclick="togglePassword()"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                        <i id="eyeIcon" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Remember Me -->
            <div class="flex items-center justify-between">
                <label class="flex items-center cursor-pointer">
                    <input type="checkbox" class="w-4 h-4 text-purple-600 border-gray-300 rounded focus:ring-purple-500">
                    <span class="ml-2 text-sm text-gray-600">Ghi nhớ đăng nhập</span>
                </label>
                <a href="#" class="text-sm text-purple-600 hover:text-purple-700 font-semibold">
                    Quên mật khẩu?
                </a>
            </div>

            <!-- Login Button -->
            <button type="submit" 
                    id="btnLogin"
                    class="btn-login w-full py-4 text-white font-bold rounded-xl flex items-center justify-center gap-2">
                <i class="fas fa-sign-in-alt"></i>
                <span>Đăng nhập</span>
            </button>
        </form>

        <!-- Alert -->
        <div id="alert" class="hidden mt-6 p-4 rounded-xl"></div>

        <!-- Footer -->
        <div class="mt-8 text-center space-y-4">
            <p class="text-sm text-gray-500">
                <i class="fas fa-shield-alt mr-1"></i>
                Hệ thống bảo mật cao
            </p>
            <div class="pt-4 border-t border-gray-100">
                <p class="text-sm text-gray-600 mb-2">Bạn là Quản trị viên?</p>
                <a href="../admin/dang-nhap-admin.html" class="inline-block px-6 py-2 bg-purple-50 text-purple-600 rounded-lg hover:bg-purple-100 transition font-semibold text-sm w-full">
                    <i class="fas fa-crown mr-2"></i>Chuyển đến Cổng Đăng nhập Admin
                </a>
            </div>
            <a href="../index.html" class="inline-block text-gray-400 hover:text-gray-600 font-medium text-sm">
                <i class="fas fa-arrow-left mr-2"></i>Quay lại trang chủ
            </a>
        </div>
    </div>

    <script>
        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        // Show alert
        function showAlert(message, type = 'error') {
            const alert = document.getElementById('alert');
            alert.className = `mt-6 p-4 rounded-xl ${type === 'success' ? 'bg-green-100 text-green-800 border-2 border-green-300' : 'bg-red-100 text-red-800 border-2 border-red-300'}`;
            alert.innerHTML = `
                <div class="flex items-center gap-2">
                    <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                    <span class="font-semibold">${message}</span>
                </div>
            `;
            alert.classList.remove('hidden');

            setTimeout(() => {
                alert.classList.add('hidden');
            }, 5000);
        }

        // Handle login
        async function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');

            try {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Đang xử lý...';

                const response = await fetch('http://localhost:3000/api/staff/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        tai_khoan: username, 
                        mat_khau: password 
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showAlert('Đăng nhập thành công! Đang chuyển hướng...', 'success');
                    
                    // NOTE: Đã tắt chức năng xóa session Admin để tránh văng phiên đăng nhập khi dùng chung trình duyệt
                    /* 
                    try {
                        // Gọi API xóa hoàn toàn session Admin (nếu đang tồn tại) để tránh xung đột
                        // Vì bên trang admin-layout, Session Admin có mức độ ưu tiên cao hơn LocalStorage Staff
                        await fetch('http://localhost:3000/api/admin-auth/logout', {
                            method: 'POST',
                            credentials: 'include'
                        });
                        // Xóa luôn cookie ở trình duyệt cho chắc
                        document.cookie = 'admin.sid=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
                    } catch(e) { console.log('Không clear được admin session', e); }
                    */

                    // Lưu thông tin vào localStorage
                    sessionStorage.setItem('staff_user', JSON.stringify(data.data));
                    
                    // Lấy vai trò
                    const role = data.data?.vai_tro?.toLowerCase() || 'waiter';
                    
                    // Chuyển hướng ngay lập tức - tất cả vai trò vào giao diện admin
                    setTimeout(() => {
                        if (role === 'manager') {
                            window.location.href = '../admin/dashboard.html';
                        } else {
                            // Waiter, kitchen, cashier → trang đơn hàng
                            window.location.href = '../admin/orders.html';
                        }
                    }, 500);
                } else {
                    showAlert(data.message || 'Tài khoản hoặc mật khẩu không đúng!', 'error');
                }
            } catch (err) {
                console.error('Login error:', err);
                showAlert('Lỗi kết nối máy chủ. Vui lòng thử lại!', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Đăng nhập';
            }
        }

        // Check if already logged in
        function checkSession() {
            const staffUser = sessionStorage.getItem('staff_user');
            if (staffUser) {
                try {
                    const user = JSON.parse(staffUser);
                    const role = user.vai_tro?.toLowerCase() || 'waiter';
                    
                    // Đã đăng nhập, chuyển hướng
                    if (role === 'manager') {
                        window.location.href = '../admin/dashboard.html';
                    } else {
                        window.location.href = '../admin/orders.html';
                    }
                } catch (err) {
                    sessionStorage.removeItem('staff_user');
                }
            }
        }

        // Check session on load
        checkSession();
    </script>
</body>
</html>
