<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng Ký - Nhà hàng Phương Nam Vĩnh Long</title>
  <link rel="icon" type="image/png" href="images/Green Simple Clean Vegan Food Logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/modern-style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/loading.css">
  <link rel="stylesheet" href="css/glass-theme.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .register-container {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 0 0.75rem 0.5rem;
      overflow-y: auto;
    }

    @media (min-width: 768px) {
      .register-container {
        padding: 0 1rem 0.75rem;
      }
    }

    @media (max-height: 900px) {
      .register-container {
        padding-top: 0;
        padding-bottom: 0.5rem;
      }
    }

    @media (max-height: 700px) {
      .register-container {
        padding-top: 0;
        padding-bottom: 0.375rem;
      }
    }

    #avatar-preview {
      position: relative !important;
      width: 5rem !important;
      height: 5rem !important;
      border: 3px solid #fed7aa !important;
      border-radius: 9999px !important;
      overflow: hidden !important;
      background: #f9fafb !important;
      transition: all 0.3s ease;
      display: block !important;
    }

    @media (min-width: 768px) {
      #avatar-preview {
        width: 6rem !important;
        height: 6rem !important;
      }
    }

    #avatar-preview:hover {
      transform: scale(1.05);
      border-color: #ea580c;
    }

    #avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 9999px;
      display: block;
    }

    .input-error {
      border-color: #ef4444 !important;
    }

    .input-success {
      border-color: #10b981 !important;
    }

    .error-message {
      color: #ef4444;
      font-size: 0.7rem;
      margin-top: 0.25rem;
      font-weight: 500;
    }

    label[for="avatar-input"] {
      transition: all 0.3s ease;
    }

    label[for="avatar-input"]:hover {
      transform: scale(1.1);
    }

    .glass-card {
      max-height: calc(100vh - 2rem);
      overflow-y: auto;
    }

    .glass-card::-webkit-scrollbar {
      width: 5px;
    }
    
    .glass-card::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.05);
      border-radius: 10px;
    }
    
    .glass-card::-webkit-scrollbar-thumb {
      background: rgba(234, 88, 12, 0.3);
      border-radius: 10px;
    }
  </style>
</head>

<body class="bg-3d overflow-x-hidden">
  <div class="register-container">
    <div class="w-full max-w-5xl mx-auto px-3 sm:px-4">
      <!-- Logo Section -->
      <div class="text-center mb-0 mt-0">
        <a href="index.html" class="inline-flex items-center gap-2.5 sm:gap-3 bg-white/80 backdrop-blur-xl px-4 py-2.5 sm:px-5 sm:py-3 rounded-3xl border border-white/50 shadow-2xl hover:shadow-orange-200/50 transform hover:scale-105 transition-all duration-300">
          <img src="images/Green Simple Clean Vegan Food Logo.png" alt="Phương Nam Logo" class="w-12 h-12 sm:w-14 sm:h-14 rounded-full border-3 border-orange-500 shadow-lg object-cover" />
          <div class="text-left">
            <h1 class="font-dancing text-lg sm:text-xl md:text-2xl font-black text-gray-900 leading-none">Phương Nam</h1>
            <p class="text-[9px] sm:text-[10px] text-orange-600 font-bold uppercase tracking-wider mt-0.5">Vĩnh Long</p>
          </div>
        </a>
      </div>

      <!-- Registration Card -->
      <div class="glass-card w-full p-2 sm:p-3 md:p-4 shadow-2xl">
        <div class="flex flex-col md:flex-row gap-2 md:gap-4">
          <!-- Left Column: Avatar & Title -->
          <div class="md:w-1/3 flex flex-col items-center md:border-r md:border-gray-200/50 md:pr-3">
            <h2 class="text-xl sm:text-2xl md:text-3xl font-black text-center mb-0.5 sm:mb-1 text-gray-800 tracking-tight">ĐĂNG KÝ</h2>
            <p class="text-gray-500 text-center mb-2 sm:mb-3 text-xs sm:text-sm font-medium italic">Tạo tài khoản mới</p>
            
            <!-- Avatar Upload -->
            <div class="flex flex-col items-center">
              <div class="relative group">
                <div id="avatar-preview">
                  <i class="fas fa-user text-2xl sm:text-3xl text-gray-400 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></i>
                </div>
                <label for="avatar-input"
                  class="absolute bottom-0 right-0 bg-gradient-to-r from-orange-600 to-red-600 text-white w-7 h-7 sm:w-8 sm:h-8 rounded-full flex items-center justify-center cursor-pointer hover:from-orange-700 hover:to-red-700 transition-all shadow-lg hover:shadow-xl transform hover:scale-110">
                  <i class="fas fa-camera text-xs"></i>
                </label>
                <input type="file" id="avatar-input" accept="image/*" class="hidden" />
              </div>
              <p class="text-xs sm:text-sm text-gray-600 mt-2.5 font-medium text-center">Ảnh đại diện (tùy chọn)<br/>Tối đa 5MB</p>
              <p id="upload-status" class="text-[10px] font-semibold mt-1 hidden"></p>
            </div>
          </div>

          <!-- Right Column: Form -->
          <div class="md:w-2/3">
            <form id="register-form" class="space-y-2 sm:space-y-2.5">
              <!-- Grid 2 cột -->
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 sm:gap-2.5">
                <div>
                  <label class="block text-[10px] sm:text-xs font-black text-gray-500 uppercase tracking-widest mb-0.5">Họ và tên <span class="text-red-500">*</span></label>
                  <input type="text" id="ten_nguoi_dung" required
                    class="w-full px-3 py-1.5 sm:py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-600/20 focus:border-orange-600 text-sm input-glass"
                    placeholder="Nguyễn Văn A" />
                </div>

                <div>
                  <label class="block text-[10px] sm:text-xs font-black text-gray-500 uppercase tracking-widest mb-0.5">Email <span class="text-red-500">*</span></label>
                  <input type="email" id="email" required
                    class="w-full px-3 py-1.5 sm:py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-600/20 focus:border-orange-600 text-sm input-glass"
                    placeholder="email@example.com" />
                  <span id="email-error" class="error-message hidden"></span>
                </div>

                <div>
                  <label class="block text-[10px] sm:text-xs font-black text-gray-500 uppercase tracking-widest mb-0.5">Số điện thoại</label>
                  <input type="tel" id="so_dien_thoai" pattern="[0-9]{10}"
                    class="w-full px-3 py-1.5 sm:py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-600/20 focus:border-orange-600 text-sm input-glass"
                    placeholder="0123456789" maxlength="10" />
                  <p class="text-[9px] sm:text-[10px] text-gray-500 mt-0.5">Bắt đầu bằng 03, 05, 07, 08, 09</p>
                  <span id="so_dien_thoai-error" class="error-message hidden"></span>
                </div>

                <div>
                  <label class="block text-[10px] sm:text-xs font-black text-gray-500 uppercase tracking-widest mb-0.5">Địa chỉ</label>
                  <input type="text" id="dia_chi"
                    class="w-full px-3 py-1.5 sm:py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-600/20 focus:border-orange-600 text-sm input-glass"
                    placeholder="123 Đường ABC, Quận 1" />
                </div>

                <div>
                  <label class="block text-[10px] sm:text-xs font-black text-gray-500 uppercase tracking-widest mb-0.5">Giới tính</label>
                  <select id="gioi_tinh"
                    class="w-full px-3 py-1.5 sm:py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-600/20 focus:border-orange-600 text-sm input-glass">
                    <option value="khac">Khác</option>
                    <option value="nam">Nam</option>
                    <option value="nu">Nữ</option>
                  </select>
                </div>

                <div>
                  <label class="block text-[10px] sm:text-xs font-black text-gray-500 uppercase tracking-widest mb-0.5">Mật khẩu <span class="text-red-500">*</span></label>
                  <div class="relative">
                    <input type="password" id="mat_khau" required minlength="6"
                      class="w-full px-3 py-1.5 sm:py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-600/20 focus:border-orange-600 pr-10 text-sm input-glass"
                      placeholder="Tối thiểu 6 ký tự" />
                    <button type="button" onclick="togglePassword('mat_khau')"
                      class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                      <i class="fas fa-eye text-sm" id="mat_khau-icon"></i>
                    </button>
                  </div>
                  <p class="text-[9px] sm:text-[10px] text-gray-500 mt-0.5">Có chữ và số</p>
                  <span id="mat_khau-error" class="error-message hidden"></span>
                </div>

                <div>
                  <label class="block text-[10px] sm:text-xs font-black text-gray-500 uppercase tracking-widest mb-0.5">Xác nhận mật khẩu <span class="text-red-500">*</span></label>
                  <div class="relative">
                    <input type="password" id="xac_nhan_mat_khau" required minlength="6"
                      class="w-full px-3 py-1.5 sm:py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-600/20 focus:border-orange-600 pr-10 text-sm input-glass"
                      placeholder="Nhập lại mật khẩu" />
                    <button type="button" onclick="togglePassword('xac_nhan_mat_khau')"
                      class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                      <i class="fas fa-eye text-sm" id="xac_nhan_mat_khau-icon"></i>
                    </button>
                  </div>
                  <span id="xac_nhan_mat_khau-error" class="error-message hidden"></span>
                </div>
              </div>

              <label class="flex items-start mt-1.5">
                <input type="checkbox" required class="w-4 h-4 text-orange-600 rounded mt-0.5 flex-shrink-0" />
                <span class="ml-2 text-[10px] sm:text-xs text-gray-600 leading-tight">
                  Tôi đồng ý với
                  <a href="dieu-khoan-dich-vu.html" class="text-orange-600 hover:text-orange-700 font-semibold">Điều khoản dịch vụ</a>
                  và
                  <a href="chinh-sach-bao-mat.html" class="text-orange-600 hover:text-orange-700 font-semibold">Chính sách bảo mật</a>
                </span>
              </label>

              <button type="submit"
                class="w-full bg-gradient-to-r from-orange-600 to-red-600 text-white py-2 sm:py-2.5 rounded-xl font-black text-xs sm:text-sm hover:from-orange-700 hover:to-red-700 transition transform hover:-translate-y-1 shadow-lg tracking-[0.15em] uppercase mt-2">
                <i class="fas fa-user-plus mr-2"></i> ĐĂNG KÝ
              </button>

              <!-- Divider -->
              <div class="relative py-1.5 sm:py-2 flex items-center">
                <div class="flex-grow border-t border-gray-200/60"></div>
                <span class="flex-shrink mx-3 text-[9px] sm:text-[10px] text-gray-400 font-black uppercase tracking-wider">Hoặc</span>
                <div class="flex-grow border-t border-gray-200/60"></div>
              </div>

              <!-- Google Register Button -->
              <button type="button" id="google-register-btn"
                class="w-full flex items-center justify-center gap-2.5 bg-white border-2 border-gray-100 text-gray-700 py-2 sm:py-2.5 rounded-xl font-black text-xs sm:text-sm hover:bg-gray-50 transition shadow-sm transform hover:-translate-y-1">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google Logo">
                <span>TIẾP TỤC QUA GOOGLE</span>
              </button>

              <p class="text-center text-gray-500 mt-2 text-[10px] sm:text-xs font-black tracking-wider">
                ĐÃ CÓ TÀI KHOẢN?
                <a href="dang-nhap.html" class="text-orange-600 hover:text-orange-700 hover:underline font-black ml-1 uppercase">ĐĂNG NHẬP</a>
              </p>
            </form>
          </div>
        </div>
      </div>

      <!-- Back to Home -->
      <div class="text-center mt-1 sm:mt-1.5">
        <a href="index.html" class="inline-flex items-center gap-2 text-gray-600 hover:text-orange-600 transition-all font-semibold text-xs bg-white/60 backdrop-blur-sm px-3 py-1.5 rounded-full hover:bg-white/80 shadow-sm hover:shadow-md">
          <i class="fas fa-arrow-left text-xs"></i>
          <span>Quay lại trang chủ</span>
        </a>
      </div>
    </div>
  </div>

  <script src="js/loading.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/form-draft-manager.js"></script>
  <script>
    // Toggle password visibility
    function togglePassword(fieldId) {
      const field = document.getElementById(fieldId);
      const icon = document.getElementById(fieldId + '-icon');
      if (field && icon) {
        if (field.type === 'password') {
          field.type = 'text';
          icon.classList.remove('fa-eye');
          icon.classList.add('fa-eye-slash');
        } else {
          field.type = 'password';
          icon.classList.remove('fa-eye-slash');
          icon.classList.add('fa-eye');
        }
      }
    }

    // Đảm bảo DOM đã tải xong trước khi gắn sự kiện
    document.addEventListener('DOMContentLoaded', function() {
      const registerForm = document.getElementById("register-form");
      if (!registerForm) return;

      // Khởi tạo FormDraftManager
      window.registerDraftManager = new FormDraftManager('register-form');

      let uploadedAvatarPath = sessionStorage.getItem('tempAvatarPath') || null;
      let isSubmitting = false;
      let isUploading = false;

      // Restore preview from sessionStorage on page load
      if (uploadedAvatarPath && sessionStorage.getItem('tempAvatarPreview')) {
        const previewDiv = document.getElementById('avatar-preview');
        if (previewDiv) {
          previewDiv.innerHTML = sessionStorage.getItem('tempAvatarPreview');
          const uploadStatus = document.getElementById('upload-status');
          if (uploadStatus) {
            uploadStatus.textContent = '✓ Ảnh đã tải';
            uploadStatus.className = 'text-[10px] font-semibold mt-1 text-green-600';
            uploadStatus.classList.remove('hidden');
          }
        }
      }

      // Prevent page unload during upload
      window.addEventListener('beforeunload', function (e) {
        if (isUploading) {
          e.preventDefault();
          e.returnValue = 'Upload đang diễn ra, bạn có chắc muốn rời khỏi trang?';
          return e.returnValue;
        }
      });

      // Show/hide error message
      function showFieldError(fieldId, message) {
        const field = document.getElementById(fieldId);
        const errorSpan = document.getElementById(fieldId + '-error');
        if (field) field.classList.add('input-error');
        if (field) field.classList.remove('input-success');
        if (errorSpan) {
          errorSpan.textContent = message;
          errorSpan.classList.remove('hidden');
        }
      }

      function clearFieldError(fieldId) {
        const field = document.getElementById(fieldId);
        const errorSpan = document.getElementById(fieldId + '-error');
        if (field) field.classList.remove('input-error');
        if (field) field.classList.add('input-success');
        if (errorSpan) errorSpan.classList.add('hidden');
      }

      function resetFieldState(fieldId) {
        const field = document.getElementById(fieldId);
        const errorSpan = document.getElementById(fieldId + '-error');
        if (field) field.classList.remove('input-error', 'input-success');
        if (errorSpan) errorSpan.classList.add('hidden');
      }

      // Real-time validation
      const emailField = document.getElementById('email');
      if (emailField) {
        emailField.addEventListener('blur', function () {
          const email = this.value.trim();
          if (email && !validateEmail(email)) {
            showFieldError('email', 'Email không hợp lệ');
          } else if (email) {
            clearFieldError('email');
          }
        });
      }

      const phoneField = document.getElementById('so_dien_thoai');
      if (phoneField) {
        phoneField.addEventListener('blur', function () {
          const phone = this.value.trim();
          if (phone && !validatePhone(phone)) {
            showFieldError('so_dien_thoai', 'Số điện thoại phải có 10 số và bắt đầu bằng 03, 05, 07, 08, 09');
          } else if (phone) {
            clearFieldError('so_dien_thoai');
          }
        });
      }

      const passwordField = document.getElementById('mat_khau');
      if (passwordField) {
        passwordField.addEventListener('blur', function () {
          const password = this.value;
          if (password) {
            const validation = validatePassword(password);
            if (!validation.valid) {
              showFieldError('mat_khau', validation.message);
            } else {
              clearFieldError('mat_khau');
            }
          }
        });
      }

      const confirmPasswordField = document.getElementById('xac_nhan_mat_khau');
      if (confirmPasswordField) {
        confirmPasswordField.addEventListener('blur', function () {
          const password = document.getElementById('mat_khau').value;
          const confirmPassword = this.value;
          if (confirmPassword) {
            if (password !== confirmPassword) {
              showFieldError('xac_nhan_mat_khau', 'Mật khẩu xác nhận không khớp');
            } else {
              clearFieldError('xac_nhan_mat_khau');
            }
          }
        });
      }

      // Clear errors on input
      ['email', 'so_dien_thoai', 'mat_khau', 'xac_nhan_mat_khau'].forEach(fieldId => {
        const field = document.getElementById(fieldId);
        if (field) {
          field.addEventListener('input', function () {
            resetFieldState(fieldId);
          });
        }
      });

      // Xử lý chọn ảnh
      const avatarInput = document.getElementById("avatar-input");
      if (avatarInput) {
        avatarInput.addEventListener("change", async function (e) {
          const file = e.target.files[0];
          if (!file) return;

          // Validate file type
          if (!file.type.startsWith('image/')) {
            showNotification('Vui lòng chọn file ảnh', 'error');
            this.value = '';
            return;
          }

          // Validate file size (5MB)
          if (file.size > 5 * 1024 * 1024) {
            showNotification('Kích thước ảnh không được vượt quá 5MB', 'error');
            this.value = '';
            return;
          }

          // Show preview
          const reader = new FileReader();
          reader.onload = function (e) {
            const previewDiv = document.getElementById('avatar-preview');
            if (previewDiv) {
              previewDiv.innerHTML = `<img src="${e.target.result}" alt="Preview" class="w-full h-full object-cover rounded-full">`;
            }
          };
          reader.readAsDataURL(file);

          // Upload to server
          isUploading = true;
          const uploadStatus = document.getElementById('upload-status');
          if (uploadStatus) {
            uploadStatus.textContent = 'Đang tải...';
            uploadStatus.className = 'text-[10px] font-semibold mt-1 text-blue-600';
            uploadStatus.classList.remove('hidden');
          }

          const formData = new FormData();
          formData.append('avatar', file);

          try {
            const response = await fetch('http://localhost:3000/api/auth/upload-avatar', {
              method: 'POST',
              body: formData
            });

            if (!response.ok) {
              throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }

            const result = await response.json();

            if (result.success) {
              uploadedAvatarPath = result.data.anh_dai_dien;
              sessionStorage.setItem('tempAvatarPath', uploadedAvatarPath);
              const previewDiv = document.getElementById('avatar-preview');
              if (previewDiv) {
                sessionStorage.setItem('tempAvatarPreview', previewDiv.innerHTML);
              }

              if (uploadStatus) {
                uploadStatus.textContent = '✓ Tải thành công';
                uploadStatus.className = 'text-[10px] font-semibold mt-1 text-green-600';
              }
              showNotification('Tải ảnh thành công!', 'success');
            } else {
              throw new Error(result.message || 'Upload thất bại');
            }
          } catch (error) {
            const uploadStatus = document.getElementById('upload-status');
            if (uploadStatus) {
              uploadStatus.textContent = '✗ Tải thất bại';
              uploadStatus.className = 'text-[10px] font-semibold mt-1 text-red-600';
            }
            showNotification('Lỗi tải ảnh: ' + error.message, 'error');
            uploadedAvatarPath = null;

            const previewDiv = document.getElementById('avatar-preview');
            if (previewDiv) {
              previewDiv.innerHTML = '<i class="fas fa-user text-2xl sm:text-3xl text-gray-400 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></i>';
            }
          } finally {
            isUploading = false;
          }
        });
      }

      // Validation functions
      function validateEmail(email) {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(email);
      }

      function validatePhone(phone) {
        if (!phone) return true;
        const re = /^(0[3|5|7|8|9])+([0-9]{8})$/;
        return re.test(phone);
      }

      function validatePassword(password) {
        if (password.length < 6) {
          return { valid: false, message: 'Mật khẩu phải có ít nhất 6 ký tự' };
        }
        if (!/[A-Za-z]/.test(password)) {
          return { valid: false, message: 'Mật khẩu phải chứa ít nhất 1 chữ cái' };
        }
        if (!/[0-9]/.test(password)) {
          return { valid: false, message: 'Mật khẩu phải chứa ít nhất 1 chữ số' };
        }
        return { valid: true };
      }

      registerForm.addEventListener("submit", async function(e) {
        e.preventDefault();
        e.stopPropagation();

        if (isSubmitting) return false;
        if (isUploading) {
          showNotification('Vui lòng đợi ảnh tải xong', 'error');
          return false;
        }

        const submitBtn = registerForm.querySelector('button[type="submit"]');
        const originalBtnHTML = submitBtn ? submitBtn.innerHTML : '';

        // Get form data
        const ten_nguoi_dung = document.getElementById("ten_nguoi_dung").value.trim();
        const email = document.getElementById("email").value.trim();
        const so_dien_thoai = document.getElementById("so_dien_thoai").value.trim();
        const dia_chi = document.getElementById("dia_chi").value.trim();
        const gioi_tinh = document.getElementById("gioi_tinh").value;
        const mat_khau = document.getElementById("mat_khau").value;
        const xac_nhan_mat_khau = document.getElementById("xac_nhan_mat_khau").value;

        // Client-side validation
        if (!ten_nguoi_dung || ten_nguoi_dung.length < 2) {
          showNotification('Tên phải có ít nhất 2 ký tự', 'error');
          return false;
        }

        if (!validateEmail(email)) {
          showNotification('Email không hợp lệ', 'error');
          return false;
        }

        if (so_dien_thoai && !validatePhone(so_dien_thoai)) {
          showNotification('Số điện thoại không hợp lệ', 'error');
          return false;
        }

        const passwordValidation = validatePassword(mat_khau);
        if (!passwordValidation.valid) {
          showNotification(passwordValidation.message, 'error');
          return false;
        }

        if (mat_khau !== xac_nhan_mat_khau) {
          showNotification('Mật khẩu xác nhận không khớp', 'error');
          return false;
        }

        isSubmitting = true;
        if (submitBtn) {
          submitBtn.disabled = true;
          submitBtn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> Đang xử lý...`;
        }

        const formData = {
          ten_nguoi_dung,
          email,
          so_dien_thoai: so_dien_thoai || null,
          dia_chi: dia_chi || null,
          gioi_tinh,
          mat_khau,
          anh_dai_dien: uploadedAvatarPath,
        };

        try {
          const response = await fetch("http://localhost:3000/api/auth/send-verification", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(formData),
          });

          const result = await response.json();

          if (result.success) {
            sessionStorage.removeItem('tempAvatarPath');
            sessionStorage.removeItem('tempAvatarPreview');
            if (window.registerDraftManager) window.registerDraftManager.clear();

            showNotification('Mã xác thực đã được gửi đến email của bạn!', 'success');

            setTimeout(() => {
              window.location.href = `xac-thuc-email.html?email=${encodeURIComponent(formData.email)}`;
            }, 1500);
          } else {
            showNotification(result.message || 'Đăng ký thất bại', 'error');
            if (submitBtn) {
              submitBtn.disabled = false;
              submitBtn.innerHTML = originalBtnHTML;
            }
            isSubmitting = false;
          }
        } catch (error) {
          showNotification('Không thể kết nối đến server. Vui lòng thử lại sau.', 'error');
          if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalBtnHTML;
          }
          isSubmitting = false;
        }

        return false;
      });

      // Xử lý click nút đăng ký Google
      const googleRegisterBtn = document.getElementById('google-register-btn');
      if (googleRegisterBtn) {
        googleRegisterBtn.addEventListener('click', function() {
          window.location.href = 'http://localhost:3000/api/auth/google';
        });
      }
    });
  </script>
</body>
</html>
